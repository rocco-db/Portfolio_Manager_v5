                                                )}
                                            </div>
                                        </div>
                                    );
                                };
        

        // ========== TAB PAC ==========
        const PACTab = ({ pacSchedules, setPacSchedules, addInvestment, showToast, investments }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [filterType, setFilterType] = useState('Tutti');
            const [sortBy, setSortBy] = useState('amount');
            const [showNewPacForm, setShowNewPacForm] = useState(false);
            const [form, setForm] = useState({ 
                assetName: '', 
                ticker: '',
                isin: '', 
                type: 'ETF', 
                amount: '', 
                frequency: 'monthly', 
                startDate: new Date().toISOString().split('T')[0],
                estimatedPrice: ''
            });
            const [editingPacId, setEditingPacId] = useState(null);
            const [editingPacFull, setEditingPacFull] = useState(null);
            const [editAmount, setEditAmount] = useState('');
            const [expandedPacGroups, setExpandedPacGroups] = useState(new Set());

            const handleSubmit = () => {
                if (!form.assetName || !form.amount || !form.estimatedPrice) {
                    alert('Compila tutti i campi obbligatori');
                    return;
                }
                
                // Validazione valori numerici
                const amount = parseFloat(form.amount);
                const price = parseFloat(form.estimatedPrice);
                
                if (isNaN(amount) || amount <= 0) {
                    alert('❌ Errore: L\'importo PAC deve essere maggiore di 0');
                    return;
                }
                
                if (isNaN(price) || price <= 0) {
                    alert('❌ Errore: Il prezzo stimato deve essere maggiore di 0');
                    return;
                }
                
                // Validazione ISIN per non-crypto
                if (form.type !== 'Criptovalute' && !form.isin) {
                    alert('⚠️ ISIN obbligatorio per ' + form.type);
                    return;
                }
                
                if (form.type !== 'Criptovalute' && form.isin) {
                    const isinRegex = /^[A-Z]{2}[A-Z0-9]{9}[0-9]$/;
                    if (!isinRegex.test(form.isin.toUpperCase())) {
                        const confirmInvalid = confirm(
                            '⚠️ ISIN non standard\n\n' +
                            'Vuoi procedere comunque?'
                        );
                        if (!confirmInvalid) return;
                    }
                }

                setPacSchedules(prev => [...prev, { 
                    ...form, 
                    id: Date.now() + Math.random(), 
                    amount: parseFloat(form.amount),
                    estimatedPrice: parseFloat(form.estimatedPrice),
                    createdAt: new Date().toISOString(),
                    executionHistory: [],
                    suspended: false
                }]);
                showToast('✅ PAC configurato!');
                setForm({ 
                    assetName: '', ticker: '', isin: '', type: 'ETF', amount: '', 
                    frequency: 'monthly', startDate: new Date().toISOString().split('T')[0],
                    estimatedPrice: ''
                });
            };

            const executePAC = (pac) => {
                const actualPriceInput = window.prompt(
                    `💰 ESECUZIONE PAC: ${pac.assetName}\n\n` +
                    `Importo: €${pac.amount}\n` +
                    `Prezzo stimato: €${pac.estimatedPrice}\n\n` +
                    `Inserisci il PREZZO ATTUALE di acquisto:`,
                    pac.estimatedPrice
                );
        
        if (!actualPriceInput) return;
        
        const actualPrice = parseFloat(actualPriceInput);
        if (isNaN(actualPrice) || actualPrice <= 0) {
            alert('⚠️ Prezzo non valido');
            return;
        }
        
        const quantity = pac.amount / actualPrice;
        
        const newInvestment = {
            name: pac.assetName,
            ticker: pac.ticker,
            isin: pac.isin || '',
            type: pac.type,
            quantity: quantity,
            purchasePrice: actualPrice,
            purchaseDate: new Date().toISOString().split('T')[0],
            pacId: pac.id
        };
        
        addInvestment(newInvestment);
        
        setPacSchedules(prev => prev.map(p => 
            p.id === pac.id ? {
                ...p,
                executionHistory: [...(p.executionHistory || []), {
                    date: new Date().toISOString(),
                    amount: pac.amount,
                    price: actualPrice,
                    quantity: quantity,
                    ticker: pac.ticker
                }]
            } : p
        ));
        
        showToast(`✅ PAC eseguito! Acquistati ${quantity.toFixed(4)} unità di ${pac.assetName} a €${actualPrice.toFixed(2)}`);
    };

    const startEditingPac = (pac) => {
        setEditingPacId(pac.id);
        setEditAmount(pac.amount.toString());
    };

    const saveEditedAmount = (pacId) => {
        const newAmount = parseFloat(editAmount);
        if (isNaN(newAmount) || newAmount < 0) {
            alert('⚠️ Importo non valido (deve essere ≥ 0)');
            return;
        }
        
        // Se importo = 0, sospendi automaticamente
        const shouldSuspend = newAmount === 0;
        
        setPacSchedules(prev => prev.map(p => 
            p.id === pacId ? { 
                ...p, 
                amount: newAmount,
                suspended: shouldSuspend || p.suspended 
            } : p
        ));
        
        setEditingPacId(null);
        setEditAmount('');
        
        if (shouldSuspend) {
            showToast('⏸️ PAC sospeso (importo = 0)');
        } else {
            showToast('✅ Importo PAC aggiornato!');
        }
    };

    const cancelEditing = () => {
        setEditingPacId(null);
        setEditAmount('');
    };
    const togglePacGroup = (key) => {
        setExpandedPacGroups(prev => {
            const next = new Set(prev);
            if (next.has(key)) {
                next.delete(key);
            } else {
                next.add(key);
            }
            return next;
        });
    };
    const toggleSuspendPAC = (pacId) => {
        setPacSchedules(prev => prev.map(p => 
            p.id === pacId ? { ...p, suspended: !p.suspended } : p
        ));
        
        const pac = pacSchedules.find(p => p.id === pacId);
        if (pac) {
            showToast(pac.suspended ? '▶️ PAC riattivato!' : '⏸️ PAC sospeso');
        }
    };

    const deletePAC = (id) => {
        if (confirm('Eliminare questo PAC?')) {
            setPacSchedules(prev => prev.filter(p => p.id !== id));
            showToast('PAC eliminato');
        }
    };

    // Raggruppa PAC per asset (come nel portafoglio)
    // Raggruppa PAC per asset (come nel portafoglio)
    const groupedPACs = useMemo(() => {
        const groups = {};
        pacSchedules.forEach(pac => {
            const key = pac.ticker || pac.assetName;
            if (!groups[key]) {
                groups[key] = {
                    name: pac.assetName,
                    ticker: pac.ticker,
                    type: pac.type,
                    pacs: []
                };
            }
            groups[key].pacs.push(pac);
        });
        
        let result = Object.values(groups);
        
        // FILTRO PER RICERCA
        if (searchTerm) {
            result = result.filter(g => 
                g.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                (g.ticker && g.ticker.toLowerCase().includes(searchTerm.toLowerCase()))
            );
        }
        
        // FILTRO PER TIPO
        if (filterType !== 'Tutti') {
            result = result.filter(g => g.type === filterType);
        }
        
        // ORDINAMENTO
        result.sort((a, b) => {
            const aMonthly = a.pacs.filter(p => p.frequency === 'monthly').reduce((sum, p) => sum + p.amount, 0);
            const bMonthly = b.pacs.filter(p => p.frequency === 'monthly').reduce((sum, p) => sum + p.amount, 0);
            const aExecutions = a.pacs.reduce((sum, p) => sum + (p.executionHistory?.length || 0), 0);
            const bExecutions = b.pacs.reduce((sum, p) => sum + (p.executionHistory?.length || 0), 0);
            
            switch(sortBy) {
                case 'name': return a.name.localeCompare(b.name);
                case 'amount': return bMonthly - aMonthly;
                case 'executions': return bExecutions - aExecutions;
                default: return 0;
            }
        });
        
        return result;
    }, [pacSchedules, searchTerm, filterType, sortBy]);

    return (
        <div>
            {pacSchedules.length > 0 && (
                <div className="card" style={{background: 'linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%)', marginBottom: '19px'}}>
                    <h3 style={{fontSize: '23px', fontWeight: 'bold', marginBottom: '15px'}}>📊 Riepilogo PAC</h3>
                    <div className="grid grid-4">
                        <div style={{textAlign: 'center'}}>
                            <div style={{fontSize: '13px', opacity: 0.9, marginBottom: '7px'}}>💰 Totale Mensile</div>
                            <div style={{fontSize: '41px', fontWeight: 'bold'}}>
                                €{pacSchedules
                                    .filter(p => p.frequency === 'monthly' && !p.suspended)
                                    .reduce((sum, p) => sum + p.amount, 0)
                                    .toFixed(2)}
                            </div>
                        </div>
                        <div style={{textAlign: 'center'}}>
                            <div style={{fontSize: '13px', opacity: 0.9, marginBottom: '7px'}}>✅ PAC Attivi</div>
                            <div style={{fontSize: '41px', fontWeight: 'bold', color: '#10b981'}}>
                                {pacSchedules.filter(p => !p.suspended).length}
                            </div>
                        </div>
                        <div style={{textAlign: 'center'}}>
                            <div style={{fontSize: '13px', opacity: 0.9, marginBottom: '7px'}}>⏸️ PAC Sospesi</div>
                            <div style={{fontSize: '41px', fontWeight: 'bold', color: '#f59e0b'}}>
                                {pacSchedules.filter(p => p.suspended).length}
                            </div>
                        </div>
                        <div style={{textAlign: 'center'}}>
                            <div style={{fontSize: '13px', opacity: 0.9, marginBottom: '7px'}}>📈 Esecuzioni</div>
                            <div style={{fontSize: '41px', fontWeight: 'bold'}}>
                                {pacSchedules.reduce((sum, p) => sum + (p.executionHistory?.length || 0), 0)}
                            </div>
                        </div>
                    </div>
                </div>
            )}

            <div className="card">
                <div 
                    style={{
                        display: 'flex', 
                        justifyContent: 'space-between', 
                        alignItems: 'center', 
                        marginBottom: showNewPacForm ? '15px' : '0',
                        cursor: 'pointer',
                        padding: '7px',
                        borderRadius: '7px',
                        transition: 'background 0.2s'
                    }}
                    onClick={() => setShowNewPacForm(!showNewPacForm)}
                    onMouseEnter={(e) => e.currentTarget.style.background = '#374151'}
                    onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}
                >
                    <div>
                        <h3 style={{fontSize: '19px', fontWeight: 'bold', margin: 0}}>📅 Nuovo PAC</h3>
                        {!showNewPacForm && (
                            <p style={{color: '#94a3b8', margin: 0, fontSize: '13px'}}>
                                Clicca per configurare acquisti ricorrenti
                            </p>
                        )}
                    </div>
                    <div style={{fontSize: '19px', fontWeight: 'bold', color: '#a1a1a1'}}>
                        {showNewPacForm ? '▼ Nascondi' : '▶ Espandi'}
                    </div>
                </div>
                
                {showNewPacForm && (
                    <>
                        <p style={{color: '#94a3b8', marginBottom: '15px', fontSize: '13px'}}>
                            Configura acquisti ricorrenti automatici
                        </p>
                
                        <div style={{marginBottom: '19px'}}>
                            <label style={{display: 'block', fontSize: '13px', fontWeight: '600', marginBottom: '7px'}}>
                                🎯 Seleziona Asset Esistente (opzionale)
                            </label>
                            <select 
                                value=""
                                onChange={(e) => {
                                    if (e.target.value) {
                                        const selectedInv = JSON.parse(e.target.value);
                                        setForm({
                                            ...form,
                                            assetName: selectedInv.name,
                                            ticker: selectedInv.ticker,
                                            isin: selectedInv.isin || '',
                                            type: selectedInv.type,
                                            estimatedPrice: selectedInv.currentPrice.toFixed(2)
                                        });
                                    }
                                }}
                                style={{marginBottom: '19px'}}
                            >
                                <option value="">-- Oppure compila manualmente --</option>
                                {investments && investments.length > 0 && 
                                    [...new Map(investments.map(inv => [inv.ticker, inv])).values()].map(inv => (
                                        <option key={inv.ticker} value={JSON.stringify({name: inv.name, ticker: inv.ticker, isin: inv.isin, type: inv.type, currentPrice: inv.currentPrice})}>
                                            {inv.name} ({inv.ticker}) - €{inv.currentPrice.toFixed(2)}
                                        </option>
                                    ))
                                }
                            </select>
                        </div>

                        <div className="grid grid-4">
                            <input 
                                placeholder="Nome Asset *" 
                                value={form.assetName} 
                                onChange={e => setForm({...form, assetName: e.target.value})} 
                            />
                            <input 
                                placeholder="Ticker (es. VWCE.MI)" 
                                value={form.ticker} 
                                onChange={e => setForm({...form, ticker: e.target.value.toUpperCase()})} 
                            />
                            <input 
                                placeholder={form.type === 'Criptovalute' ? 'ISIN (opzionale per crypto)' : 'ISIN *'} 
                                value={form.isin} 
                                onChange={e => setForm({...form, isin: e.target.value.toUpperCase()})} 
                            />
                            <select value={form.type} onChange={e => setForm({...form, type: e.target.value})}>
                                <option>ETF</option>
                                <option>Azioni</option>
                                <option>Criptovalute</option>
                                <option>Obbligazioni</option>
                                <option>Commodities</option>
                            </select>
                            <input 
                                type="number" 
                                placeholder="Importo periodico (€) *" 
                                value={form.amount} 
                                onChange={e => setForm({...form, amount: e.target.value})} 
                            />
                            <input 
                                type="number" 
                                step="0.01"
                                placeholder="Prezzo stimato (€) *" 
                                value={form.estimatedPrice} 
                                onChange={e => setForm({...form, estimatedPrice: e.target.value})} 
                            />
                            <select value={form.frequency} onChange={e => setForm({...form, frequency: e.target.value})}>
                                <option value="monthly">Mensile</option>
                                <option value="quarterly">Trimestrale</option>
                                <option value="biannual">Semestrale</option>
                            </select>
                            <select value={form.frequency} onChange={e => setForm({...form, frequency: e.target.value})}>
                                <option value="monthly">Mensile</option>
                                <option value="quarterly">Trimestrale</option>
                                <option value="biannual">Semestrale</option>
                            </select>
                            <input 
                                type="date"
                                value={form.startDate}
                                onChange={e => setForm({...form, startDate: e.target.value})}
                                title="Data prima esecuzione"
                            />
                        </div>
                        <button className="btn btn-primary" onClick={handleSubmit} style={{marginTop: '11px', width: '100%'}}>
                            📅 Configura PAC
                        </button>
                    </>
                )}
            </div>

            {pacSchedules.length > 0 && (
                <div className="card">
                    <h3 style={{fontSize: '19px', fontWeight: 'bold', marginBottom: '15px'}}>
                        💼 I Tuoi PAC ({pacSchedules.filter(p => !p.suspended).length} attivi
                        {pacSchedules.filter(p => p.suspended).length > 0 && 
                            `, ${pacSchedules.filter(p => p.suspended).length} sospesi`})
                    </h3>

                    {/* Barra ricerca e filtri */}
                    <div style={{marginBottom: '19px', display: 'flex', gap: '11px', flexWrap: 'wrap'}}>
                        <input 
                            type="text"
                            placeholder="🔍 Cerca PAC (nome o ticker)..."
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            style={{flex: '1 1 300px', marginBottom: '0'}}
                        />
                        <select 
                            value={filterType}
                            onChange={(e) => setFilterType(e.target.value)}
                            style={{flex: '0 0 150px', marginBottom: '0'}}
                        >
                            <option>Tutti</option>
                            <option>ETF</option>
                            <option>Azioni</option>
                            <option>Criptovalute</option>
                        </select>
                        <select 
                            value={sortBy}
                            onChange={(e) => setSortBy(e.target.value)}
                            style={{flex: '0 0 150px', marginBottom: '0'}}
                        >
                            <option value="amount">💰 Importo</option>
                            <option value="executions">✅ Esecuzioni</option>
                            <option value="name">📊 Nome</option>
                        </select>
                    </div>

                    {/* Vista Card Compatta come Portafoglio */}
                    <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: '11px'}}>
                        {groupedPACs.map(group => {
                            const activePacs = group.pacs.filter(p => !p.suspended);
                            const suspendedPacs = group.pacs.filter(p => p.suspended);
                            const totalMonthly = activePacs
                                .filter(p => p.frequency === 'monthly')
                                .reduce((sum, p) => sum + p.amount, 0);
                            const allSuspended = group.pacs.every(p => p.suspended);
                            const totalExecutions = group.pacs.reduce((sum, p) => sum + (p.executionHistory?.length || 0), 0);
                            
                            return (
                                <div key={group.ticker || group.name}>
                                    {/* Card Mini */}
                                    <div 
                                        style={{
                                            background: allSuspended ? '#1f2937' : '#374151',
                                            borderRadius: '11px',
                                            padding: '15px',
                                            opacity: allSuspended ? 0.5 : 1,
                                            border: allSuspended ? '2px dashed #4b5563' : '2px solid transparent',
                                            cursor: 'pointer',
                                            transition: 'all 0.2s'
                                        }}
                                        onClick={() => togglePacGroup(group.ticker || group.name)}
                                        onMouseEnter={(e) => e.currentTarget.style.transform = 'translateY(-2px)'}
                                        onMouseLeave={(e) => e.currentTarget.style.transform = 'translateY(0)'}
                                    >
                                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'start', marginBottom: '7px'}}>
                                            <div style={{flex: 1}}>
                                                <div style={{fontSize: '15px', fontWeight: 'bold', marginBottom: '3px'}}>{group.name}</div>
                                                <div style={{fontSize: '11px', color: '#94a3b8'}}>
                                                    {group.ticker} • {group.type}
                                                </div>
                                            </div>
                                            <div style={{display: 'flex', gap: '3px', flexWrap: 'wrap'}}>
                                                <span className={`badge badge-blue`} style={{fontSize: '9px'}}>
                                                    {group.pacs.length} PAC
                                                </span>
                                                {allSuspended && (
                                                    <span className="badge" style={{background: '#6b7280', fontSize: '9px'}}>
                                                        ⏸️ Sospeso
                                                    </span>
                                                )}
                                                {activePacs.length > 0 && suspendedPacs.length > 0 && (
                                                    <span className="badge badge-yellow" style={{fontSize: '9px'}}>
                                                        {suspendedPacs.length} sospesi
                                                    </span>
                                                )}
                                            </div>
                                        </div>
                                        
                                        <div style={{fontSize: '23px', fontWeight: 'bold', marginBottom: '3px', color: '#8b5cf6'}}>
                                            €{totalMonthly.toFixed(2)}/mese
                                        </div>
                                        
                                        <div style={{fontSize: '13px', color: '#94a3b8'}}>
                                            {totalExecutions} esecuzioni totali
                                        </div>
                                    </div>

                                    {/* Dettagli PAC */}
                                {expandedPacGroups.has(group.ticker || group.name) && (
                                    <div style={{
                                        background: '#1e293b',
                                        borderRadius: '11px',
                                        padding: '15px',
                                        marginTop: '7px'
                                    }}>
                                        {group.pacs.map(pac => {
                                            const isEditing = editingPacId === pac.id;
                                            const matchingInv = investments.find(i => i.ticker === pac.ticker);
                                            const lastPrice = pac.executionHistory && pac.executionHistory.length > 0 
                                                ? pac.executionHistory[pac.executionHistory.length - 1].price 
                                                : pac.estimatedPrice;
                                            const currentPrice = matchingInv ? matchingInv.currentPrice : lastPrice;

                                            return (
                                                <div key={pac.id} style={{
                                                    background: pac.suspended ? '#1f2937' : '#374151',
                                                    padding: '11px',
                                                    borderRadius: '7px',
                                                    marginBottom: '7px',
                                                    fontSize: '13px',
                                                    opacity: pac.suspended ? 0.6 : 1,
                                                    borderLeft: pac.suspended ? '3px solid #6b7280' : '3px solid #3b82f6'
                                                }}>
                                                    {pac.suspended && (
                                                        <div style={{
                                                            background: '#fbbf24',
                                                            color: '#000',
                                                            padding: '3px 8px',
                                                            borderRadius: '3px',
                                                            fontSize: '11px',
                                                            fontWeight: 'bold',
                                                            marginBottom: '7px',
                                                            display: 'inline-block'
                                                        }}>
                                                            ⏸️ PAC SOSPESO
                                                        </div>
                                                    )}
                                                    <div style={{display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '7px', marginBottom: '9px'}}>
                                                        <div>
                                                            <div style={{color: '#94a3b8', fontSize: '11px'}}>Importo</div>
                                                            {isEditing ? (
                                                                <input
                                                                    type="number"
                                                                    value={editAmount}
                                                                    onChange={(e) => setEditAmount(e.target.value)}
                                                                    style={{
                                                                        width: '100%',
                                                                        padding: '3px 8px',
                                                                        fontSize: '13px',
                                                                        marginBottom: '0'
                                                                    }}
                                                                    autoFocus
                                                                />
                                                            ) : (
                                                                <div style={{fontWeight: '600', fontSize: '15px', color: '#8b5cf6'}}>
                                                                    €{pac.amount}
                                                                </div>
                                                            )}
                                                        </div>
                                                        <div>
                                                            <div style={{color: '#94a3b8', fontSize: '11px'}}>Frequenza</div>
                                                            <div style={{fontWeight: '600'}}>
                                                                {pac.frequency === 'monthly' ? 'Mensile' : pac.frequency === 'quarterly' ? 'Trimestrale' : 'Semestrale'}
                                                            </div>
                                                        </div>
                                                        <div>
                                                            <div style={{color: '#94a3b8', fontSize: '11px'}}>Prezzo Attuale</div>
                                                            <div style={{fontWeight: '600', color: '#3b82f6'}}>€{currentPrice.toFixed(2)}</div>
                                                        </div>
                                                        <div>
                                                            <div style={{color: '#94a3b8', fontSize: '11px'}}>Esecuzioni</div>
                                                            <div style={{fontWeight: '600'}}>{pac.executionHistory?.length || 0}</div>
                                                        </div>
                                                    </div>

                                                    <div style={{display: 'flex', gap: '5px', flexWrap: 'wrap'}}>
                                                        {isEditing ? (
                                                            <>
                                                                <button 
                                                                    className="btn btn-success btn-sm"
                                                                    onClick={() => saveEditedAmount(pac.id)}
                                                                    style={{flex: '1 1 auto', fontSize: '11px', padding: '5px 11px'}}
                                                                >
                                                                    ✅ Salva
                                                                </button>
                                                                <button 
                                                                    className="btn btn-secondary btn-sm"
                                                                    onClick={cancelEditing}
                                                                    style={{flex: '1 1 auto', fontSize: '11px', padding: '5px 11px'}}
                                                                >
                                                                    ❌ Annulla
                                                                </button>
                                                            </>
                                                        ) : (
                                                            <>
                                                                <button 
                                                                    className="btn btn-success btn-sm" 
                                                                    onClick={() => executePAC(pac)}
                                                                    disabled={pac.suspended}
                                                                    style={{
                                                                        flex: '1 1 auto', 
                                                                        fontSize: '11px', 
                                                                        padding: '5px 11px',
                                                                        opacity: pac.suspended ? 0.5 : 1,
                                                                        cursor: pac.suspended ? 'not-allowed' : 'pointer'
                                                                    }}
                                                                    title={pac.suspended ? 'PAC sospeso - Riattiva per eseguire' : 'Esegui PAC'}
                                                                >
                                                                    ▶️ Esegui
                                                                </button>
                                                                <button 
                                                                    className="btn btn-primary btn-sm"
                                                                    onClick={(e) => {
                                                                        e.stopPropagation();
                                                                        setEditingPacFull(pac);
                                                                    }}
                                                                    style={{flex: '1 1 auto', fontSize: '11px', padding: '5px 11px'}}
                                                                >
                                                                    ✏️
                                                                </button>
                                                                <button 
                                                                    className={`btn btn-sm ${pac.suspended ? 'btn-success' : 'btn-warning'}`}
                                                                    onClick={(e) => {
                                                                        e.stopPropagation();
                                                                        toggleSuspendPAC(pac.id);
                                                                    }}
                                                                    style={{flex: '1 1 auto', fontSize: '11px', padding: '5px 11px'}}
                                                                    title={pac.suspended ? 'Riattiva PAC' : 'Sospendi PAC'}
                                                                >
                                                                    {pac.suspended ? '▶️' : '⏸️'}
                                                                </button>
                                                                <button 
                                                                    className="btn btn-danger btn-sm" 
                                                                    onClick={() => deletePAC(pac.id)}
                                                                    style={{flex: '1 1 auto', fontSize: '11px', padding: '5px 11px'}}
                                                                >
                                                                    🗑️
                                                                </button>
                                                            </>
                                                        )}
                                                    </div>

                                                    {pac.executionHistory && pac.executionHistory.length > 0 && (
                                                        <details style={{marginTop: '11px'}}>
                                                            <summary style={{cursor: 'pointer', fontSize: '11px', color: '#94a3b8', padding: '3px'}}>
                                                                📜 Storico ({pac.executionHistory.length})
                                                            </summary>
                                                            <div style={{marginTop: '7px', fontSize: '11px'}}>
                                                                {pac.executionHistory.map((exec, idx) => (
                                                                    <div key={idx} style={{
                                                                        padding: '7px',
                                                                        background: '#1e293b',
                                                                        borderRadius: '5px',
                                                                        marginBottom: '5px',
                                                                        display: 'flex',
                                                                        justifyContent: 'space-between',
                                                                        alignItems: 'center'
                                                                    }}>
                                                                        <div>
                                                                            <div style={{fontWeight: 'bold', marginBottom: '2px'}}>
                                                                                {new Date(exec.date).toLocaleDateString('it-IT')}
                                                                            </div>
                                                                            <div style={{color: '#94a3b8'}}>
                                                                                €{exec.amount} @ €{exec.price} • Qtà: {exec.quantity.toFixed(4)}
                                                                            </div>
                                                                        </div>
                                                                        <button
                                                                            className="btn btn-danger btn-sm"
                                                                            onClick={() => {
                                                                                if (!confirm(`Eliminare esecuzione del ${new Date(exec.date).toLocaleDateString('it-IT')}?`)) return;
                                                                                
                                                                                const execDate = exec.date.split('T')[0];
                                                                                const invToRemove = investments.find(inv => 
                                                                                    inv.ticker === pac.ticker &&
                                                                                    inv.purchaseDate === execDate &&
                                                                                    Math.abs(inv.quantity - exec.quantity) < 0.0001
                                                                                );

                                                                                if (invToRemove) {
                                                                                    const deleteEvent = new CustomEvent('deleteInvestmentById', { 
                                                                                        detail: { id: invToRemove.id } 
                                                                                    });
                                                                                    window.dispatchEvent(deleteEvent);
                                                                                }

                                                                                setPacSchedules(prev => prev.map(p =>
                                                                                    p.id === pac.id ? {
                                                                                        ...p,
                                                                                        executionHistory: p.executionHistory.filter((_, i) => i !== idx)
                                                                                    } : p
                                                                                ));

                                                                                showToast('✅ Esecuzione eliminata');
                                                                            }}
                                                                            style={{fontSize: '9px', padding: '3px 7px'}}
                                                                        >
                                                                            🗑️
                                                                        </button>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </details>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}</div>
                            );
                        })}
                    </div>
                </div>
            )}

            {pacSchedules.length === 0 && (
                <div className="info-box">
                    <h4 style={{fontSize: '17px', fontWeight: 'bold', marginBottom: '7px'}}>💡 Cos'è un PAC?</h4>
                    <p style={{color: '#94a3b8', marginBottom: '11px'}}>
                        Il Piano di Accumulo Capitale ti permette di investire somme fisse periodicamente, 
                        riducendo il rischio timing e mediando il prezzo (Dollar Cost Averaging).
                    </p>
                </div>
            )}
            {pacSchedules.filter(p => p.suspended).length > 0 && (
                <div className="warning-box">
                    <h4 style={{fontSize: '15px', fontWeight: 'bold', marginBottom: '7px'}}>
                        ⏸️ Hai {pacSchedules.filter(p => p.suspended).length} PAC sospesi
                    </h4>
                    <p style={{color: '#94a3b8', fontSize: '13px'}}>
                        I PAC sospesi NON vengono conteggiati nel totale mensile e NON possono essere eseguiti.

        const PriceChartModal = ({ asset, onClose, investments }) => {
            const canvasRef = React.useRef(null);

            React.useEffect(() => {
                if (!canvasRef.current) return;

                // Raccogli dati storici prezzi per questo asset
                const assetData = investments
                    .filter(inv => inv.ticker === asset.ticker)
                    .sort((a, b) => new Date(a.purchaseDate) - new Date(b.purchaseDate))
                    .map(inv => ({
                        date: inv.purchaseDate,
                        price: inv.purchasePrice,
                        current: inv.currentPrice
                    }));

                // Aggiungi punto corrente
                if (assetData.length > 0) {
                    assetData.push({
                        date: new Date().toISOString().split('T')[0],
                        price: assetData[assetData.length - 1].current,
                        current: assetData[assetData.length - 1].current
                    });
                }

                const chart = new Chart(canvasRef.current, {
                    type: 'line',
                    data: {
                        labels: assetData.map(d => new Date(d.date).toLocaleDateString('it-IT')),
                        datasets: [{
                            label: 'Prezzo (€)',
                            data: assetData.map(d => d.price),
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { display: true, labels: { color: '#e2e8f0' } },
                            title: { display: true, text: `${asset.name} - Storico Prezzi`, color: '#e2e8f0', font: { size: 18 } }
                        },
                        scales: {
                            y: { 
                                ticks: { color: '#94a3b8' },
                                grid: { color: '#374151' }
                            },
                            x: { 
                                ticks: { color: '#94a3b8' },
                                grid: { color: '#374151' }
                            }
                        }
                    }
                });

                return () => chart.destroy();
            }, [asset, investments]);

            return (
                <div className="modal" onClick={onClose}>
                    <div className="modal-content" onClick={(e) => e.stopPropagation()} style={{maxWidth: '900px'}}>
                        <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '19px'}}>
                            <h2 style={{fontSize: '23px', fontWeight: 'bold'}}>📈 {asset.name}</h2>
                            <button className="btn btn-secondary btn-sm" onClick={onClose}>✕</button>
                        </div>
                        <canvas ref={canvasRef} />
                    </div>
                </div>
            );
        };
