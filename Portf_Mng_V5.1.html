                        <div className="card" style={{textAlign: 'center'}}>
                            <div style={{fontSize: '13px', color: '#94a3b8', marginBottom: '7px'}}>Score Generale</div>
                            <div style={{fontSize: '47px', fontWeight: 'bold', color: '#3b82f6'}}>{aiAnalysis.overallScore}/10</div>
                        </div>
                        <div className="card" style={{textAlign: 'center'}}>
                            <div style={{fontSize: '13px', color: '#94a3b8', marginBottom: '7px'}}>Livello Rischio</div>
                            <div style={{
                                fontSize: '35px', 
                                fontWeight: 'bold',
                                color: aiAnalysis.riskLevel === 'Basso' ? '#10b981' : 
                                       aiAnalysis.riskLevel === 'Medio' ? '#f59e0b' : '#ef4444'
                            }}>
                                {aiAnalysis.riskLevel}
                            </div>
                        </div>
                        <div className="card" style={{textAlign: 'center'}}>
                            <div style={{fontSize: '13px', color: '#94a3b8', marginBottom: '7px'}}>Diversificazione</div>
                            <div style={{fontSize: '47px', fontWeight: 'bold', color: '#8b5cf6'}}>{aiAnalysis.diversificationScore}/10</div>
                        </div>
                    </div>

                    <div className="grid grid-2">
                        <div className="card">
                            <h3 style={{fontSize: '19px', fontWeight: 'bold', marginBottom: '15px', color: '#10b981'}}>
                                ✅ Punti di Forza
                            </h3>
                            <ul style={{listStyle: 'none', padding: 0}}>
                                {aiAnalysis.strengths.map((s, i) => (
                                    <li key={i} style={{padding: '11px', background: '#374151', borderRadius: '7px', marginBottom: '7px', borderLeft: '3px solid #10b981'}}>
                                        {s}
                                    </li>
                                ))}
                            </ul>
                        </div>
                        <div className="card">
                            <h3 style={{fontSize: '19px', fontWeight: 'bold', marginBottom: '15px', color: '#f59e0b'}}>
                                ⚠️ Aree di Miglioramento
                            </h3>
                            <ul style={{listStyle: 'none', padding: 0}}>
                                {aiAnalysis.weaknesses.map((w, i) => (
                                    <li key={i} style={{padding: '11px', background: '#374151', borderRadius: '7px', marginBottom: '7px', borderLeft: '3px solid #f59e0b'}}>
                                        {w}
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>

                    <div className="card">
                        <h3 style={{fontSize: '23px', fontWeight: 'bold', marginBottom: '15px'}}>📈 Proiezioni di Valore</h3>
                        <div className="grid grid-3">
                            {['conservative', 'moderate', 'aggressive'].map(scenario => (
                                <div key={scenario}>
                                    <h4 style={{fontSize: '17px', fontWeight: 'bold', marginBottom: '11px', textTransform: 'capitalize', borderBottom: '2px solid #374151', paddingBottom: '7px'}}>
                                        {scenario === 'conservative' ? '🛡️ Conservativo' : 
                                         scenario === 'moderate' ? '⚖️ Moderato' : '🚀 Aggressivo'}
                                    </h4>
                                    {Object.entries(aiAnalysis.projections[scenario]).map(([period, value]) => (
                                        <div key={period} style={{display: 'flex', justifyContent: 'space-between', padding: '11px', background: '#374151', borderRadius: '7px', marginBottom: '7px'}}>
                                            <span style={{color: '#94a3b8'}}>{period.replace('year', ' anno/i')}</span>
                                            <span style={{fontWeight: 'bold', fontSize: '17px'}}>€{value.toLocaleString()}</span>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="card">
                        <h3 style={{fontSize: '23px', fontWeight: 'bold', marginBottom: '15px'}}>🎯 Raccomandazioni Prioritarie</h3>
                        {aiAnalysis.recommendations.map((rec, i) => (
                            <div key={i} style={{
                                padding: '19px', 
                                background: '#374151', 
                                borderRadius: '11px', 
                                marginBottom: '15px',
                                borderLeft: `4px solid ${rec.priority === 'Alta' ? '#ef4444' : rec.priority === 'Media' ? '#f59e0b' : '#3b82f6'}`
                            }}>
                                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'start', marginBottom: '11px'}}>
                                    <h4 style={{fontSize: '17px', fontWeight: 'bold', flex: 1}}>{rec.action}</h4>
                                    <span className={`badge badge-${rec.priority === 'Alta' ? 'red' : rec.priority === 'Media' ? 'yellow' : 'blue'}`}>
                                        {rec.priority}
                                    </span>
                                </div>
                                <p style={{color: '#94a3b8'}}>{rec.reason}</p>
                            </div>
                        ))}
                    </div>

                    {aiAnalysis.quarterlyCalibration && (
                        <div className="card">
                            <h3 style={{fontSize: '23px', fontWeight: 'bold', marginBottom: '15px'}}>⚖️ Calibrazione Trimestrale</h3>
                            
                            {aiAnalysis.quarterlyCalibration.rebalancing && aiAnalysis.quarterlyCalibration.rebalancing.length > 0 && (
                                <div style={{marginBottom: '23px'}}>
                                    <h4 style={{fontSize: '17px', fontWeight: 'bold', marginBottom: '11px'}}>Ribilanciamento Portafoglio</h4>
                                    {aiAnalysis.quarterlyCalibration.rebalancing.map((item, i) => (
                                        <div key={i} style={{padding: '15px', background: '#374151', borderRadius: '7px', marginBottom: '11px'}}>
                                            <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '7px'}}>
                                                <span style={{fontWeight: 'bold', fontSize: '15px'}}>{item.type}</span>
                                                <span className={`badge badge-${item.action === 'Aumenta' ? 'green' : 'red'}`}>
                                                    {item.action}
                                                </span>
                                            </div>
                                            <div style={{display: 'flex', gap: '15px', fontSize: '13px'}}>
                                                <span>Attuale: <strong>{item.current}%</strong></span>
                                                <span>Target: <strong style={{color: '#3b82f6'}}>{item.target}%</strong></span>
                                                <span style={{color: item.target > item.current ? '#10b981' : '#ef4444'}}>
                                                    {item.target > item.current ? '+' : ''}{(item.target - item.current).toFixed(1)}%
                                                </span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {aiAnalysis.quarterlyCalibration.suggestedActions && (
                                <div>
                                    <h4 style={{fontSize: '17px', fontWeight: 'bold', marginBottom: '11px'}}>Azioni Suggerite</h4>
                                    <ul style={{listStyle: 'none', padding: 0}}>
                                        {aiAnalysis.quarterlyCalibration.suggestedActions.map((action, i) => (
                                            <li key={i} style={{padding: '11px', background: '#374151', borderRadius: '7px', marginBottom: '7px'}}>
                                                ✓ {action}
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            )}
                        </div>
                    )}

                    {aiAnalysis.suggestedAssets && aiAnalysis.suggestedAssets.length > 0 && (
                        <div className="card">
                            <h3 style={{fontSize: '23px', fontWeight: 'bold', marginBottom: '15px'}}>💡 Asset Consigliati</h3>
                            <div className="grid grid-2">
                                {aiAnalysis.suggestedAssets.map((asset, i) => (
                                    <div key={i} style={{padding: '19px', background: '#374151', borderRadius: '11px'}}>
                                        <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '11px'}}>
                                            <div>
                                                <div style={{fontSize: '17px', fontWeight: 'bold'}}>{asset.name}</div>
                                                <div style={{fontSize: '13px', color: '#94a3b8'}}>{asset.ticker}</div>
                                            </div>
                                            <div style={{textAlign: 'right'}}>
                                                <div style={{fontSize: '11px', color: '#94a3b8'}}>Allocazione</div>
                                                <div style={{fontSize: '23px', fontWeight: 'bold', color: '#3b82f6'}}>{asset.allocation}%</div>
                                            </div>
                                        </div>
                                        <p style={{fontSize: '13px', color: '#94a3b8'}}>{asset.reason}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {aiAnalysis.marketOutlook && (
                        <div className="card">
                            <h3 style={{fontSize: '23px', fontWeight: 'bold', marginBottom: '15px'}}>🌍 Outlook di Mercato</h3>
                            <p style={{fontSize: '15px', lineHeight: '1.6', color: '#e2e8f0'}}>{aiAnalysis.marketOutlook}</p>
                        </div>
                    )}
                </div>
            );
            // Sezione Storico Analisi
            {/* Sezione Storico Analisi */}
            {aiAnalysisHistory && aiAnalysisHistory.length > 0 && !aiAnalysis && (
                <div className="card">
                    <h3 style={{fontSize: '23px', fontWeight: 'bold', marginBottom: '15px'}}>
                        📚 Storico Analisi ({aiAnalysisHistory.length})
                    </h3>
                    <div style={{display: 'flex', flexDirection: 'column', gap: '11px'}}>
                        {aiAnalysisHistory.slice(0, 10).map((entry) => (
                            <div key={entry.id} style={{
                                padding: '15px',
                                background: '#374151',
                                borderRadius: '11px',
                                cursor: 'pointer',
                                transition: 'all 0.2s',
                                border: '2px solid transparent'
                            }}
                            onMouseEnter={(e) => e.currentTarget.style.borderColor = '#3b82f6'}
                            onMouseLeave={(e) => e.currentTarget.style.borderColor = 'transparent'}
                            onClick={() => {
                                setAiAnalysis(entry.analysis);
                                setSelectedAI(entry.provider || 'claude');
                            }}
                            >
                                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'start', marginBottom: '7px'}}>
                                    <div>
                                        <div style={{fontSize: '15px', fontWeight: 'bold'}}>
                                            {new Date(entry.date).toLocaleDateString('it-IT', {
                                                day: '2-digit',
                                                month: 'long',
                                                year: 'numeric',
                                                hour: '2-digit',
                                                minute: '2-digit'
                                            })}
                                        </div>
                                        <div style={{fontSize: '13px', color: '#94a3b8'}}>
                                            Provider: {entry.provider === 'claude' ? '🤖 Claude' : 
                                                    entry.provider === 'chatgpt' ? '💬 ChatGPT' :
                                                    entry.provider === 'gemini' ? '✨ Gemini' : '🔍 Perplexity'}
                                        </div>
                                    </div>
                                    <div style={{textAlign: 'right'}}>
                                        <div style={{fontSize: '13px', color: '#94a3b8'}}>Portafoglio</div>
                                        <div style={{fontSize: '17px', fontWeight: 'bold', color: '#10b981'}}>
                                            €{entry.portfolioValue?.toFixed(0)}
                                        </div>
                                    </div>
                                </div>
                                <div style={{fontSize: '13px', color: '#94a3b8'}}>
                                    Score: {entry.analysis.overallScore}/10 • 
                                    Rischio: {entry.analysis.riskLevel} •
                                    Diversificazione: {entry.analysis.diversificationScore}/10
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            )}    
        };             
        // ========== TAB PROFILAZIONE AVANZATA ==========
        const ProfileTab = ({ profile, setProfile, generatePlan, investments }) => {
            const [showAdvanced, setShowAdvanced] = useState(false);
            const [showBasicProfile, setShowBasicProfile] = useState(false);
            const total = profile.preferredETF + profile.preferredStocks + profile.preferredCrypto + 
                        profile.preferredBonds + profile.preferredCommodities;

            // Calcola peso effettivo settori nel portafoglio
            const calculateSectorWeight = (sectorKeywords) => {
                const totalValue = investments.reduce((s, i) => s + (i.quantity * i.currentPrice), 0);
                if (totalValue === 0) return 0;
                
                // Normalizza keywords e rimuovi stringhe vuote
                const normalizedKeywords = sectorKeywords
                    .map(kw => kw.toLowerCase().trim())
                    .filter(kw => kw.length > 0);
                
                // Cerca in name, ticker E isin
                const sectorValue = investments
                    .filter(inv => {
                        const searchText = `${inv.name} ${inv.ticker} ${inv.isin || ''}`.toLowerCase();
                        return normalizedKeywords.some(kw => searchText.includes(kw));
                    })
                    .reduce((s, i) => s + (i.quantity * i.currentPrice), 0);
                
                return ((sectorValue / totalValue) * 100).toFixed(1);
            };

            return (
                <div>
                    {/* Sezione Base */}
                    <div className="card">
                        <div 
                            style={{
                                display: 'flex', 
                                justifyContent: 'space-between', 
                                alignItems: 'center', 
                                marginBottom: showBasicProfile ? '15px' : '0',
                                cursor: 'pointer',
                                padding: '7px',
                                borderRadius: '7px',
                                transition: 'background 0.2s'
                            }}
                            onClick={() => setShowBasicProfile(!showBasicProfile)}
                            onMouseEnter={(e) => e.currentTarget.style.background = '#374151'}
                            onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}
                        >
                            <div>
                                <h3 style={{fontSize: '19px', fontWeight: 'bold', margin: 0}}>👤 Profilo Investitore</h3>
                                {!showBasicProfile && (
                                    <p style={{color: '#94a3b8', margin: 0, fontSize: '13px'}}>
                                        Clicca per configurare il tuo profilo base
                                    </p>
                                )}
                            </div>
                            <div style={{fontSize: '19px', fontWeight: 'bold', color: '#a1a1a1'}}>
                                {showBasicProfile ? '▼ Nascondi' : '▶ Espandi'}
                            </div>
                        </div>
                        
                        {showBasicProfile && (
                            <div className="grid grid-2" onClick={(e) => e.stopPropagation()}>
                            <div>
                                <label style={{display: 'block', fontSize: '13px', fontWeight: '600', marginBottom: '7px'}}>
                                    📧 Email (per report)
                                </label>
                                <input 
                                    type="email" 
                                    placeholder="tua@email.com" 
                                    value={profile.email} 
                                    onChange={e => setProfile({...profile, email: e.target.value})} 
                                />
                            </div>
                            <div>
                                <label style={{display: 'block', fontSize: '13px', fontWeight: '600', marginBottom: '7px'}}>
                                    ⚖️ Tolleranza al Rischio
                                </label>
                                <select 
                                    value={profile.riskTolerance} 
                                    onChange={e => setProfile({...profile, riskTolerance: e.target.value})}
                                >
                                    <option>Molto Bassa</option>
                                    <option>Bassa</option>
                                    <option>Media</option>
                                    <option>Alta</option>
                                    <option>Molto Alta</option>
                                </select>
                            </div>
                            <div>
                                <label style={{display: 'block', fontSize: '13px', fontWeight: '600', marginBottom: '7px'}}>
                                    ⏱️ Orizzonte Temporale (anni)
                                </label>
                                <input 
                                    type="number" 
                                    min="1" 
                                    max="50"
                                    value={profile.timeHorizon} 
                                    onChange={e => setProfile({...profile, timeHorizon: parseInt(e.target.value) || 10})} 
                                />
                            </div>
                            <div>
                                <label style={{display: 'block', fontSize: '13px', fontWeight: '600', marginBottom: '7px'}}>
                                    💰 Risparmio Mensile (€)
                                </label>
                                <input 
                                    type="number" 
                                    value={profile.monthlySavings} 
                                    onChange={e => setProfile({...profile, monthlySavings: e.target.value})} 
                                />
                            </div>
                        </div>
                    )}
                </div>

                    {/* Allocazione */}
                    <div className="card">
                        <h3 style={{fontSize: '19px', fontWeight: 'bold', marginBottom: '15px'}}>📊 Allocazione Preferita (%)</h3>
                        <div className="grid grid-3" style={{marginBottom: '19px'}}>
                            {[
                                { key: 'preferredETF', label: 'ETF', icon: '📈' },
                                { key: 'preferredStocks', label: 'Azioni', icon: '💼' },
                                { key: 'preferredCrypto', label: 'Crypto', icon: '₿' },
                                { key: 'preferredBonds', label: 'Obbligazioni', icon: '📜' },
                                { key: 'preferredCommodities', label: 'Commodities', icon: '🗿' }
                            ].map(item => (
                                <div key={item.key}>
                                    <label style={{display: 'block', fontSize: '13px', fontWeight: '600', marginBottom: '7px'}}>
                                        {item.icon} {item.label}
                                    </label>
                                    <input 
                                        type="number" 
                                        min="0" 
                                        max="100"
                                        value={profile[item.key]} 
                                        onChange={e => setProfile({...profile, [item.key]: parseInt(e.target.value) || 0})}
                                        style={{textAlign: 'center', fontSize: '19px', fontWeight: 'bold'}}
                                    />
                                </div>
                            ))}
                        </div>

                        <div style={{
                            padding: '15px', 
                            background: total === 100 ? '#10b98120' : '#f59e0b20',
                            border: `2px solid ${total === 100 ? '#10b981' : '#f59e0b'}`,
                            borderRadius: '11px'
                        }}>
                            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                <span style={{fontSize: '17px', fontWeight: 'bold'}}>Totale Allocazione:</span>
                                <span style={{
                                    fontSize: '31px', 
                                    fontWeight: 'bold',
                                    color: total === 100 ? '#10b981' : '#f59e0b'
                                }}>
                                    {total}%
                                </span>
                            </div>
                            {total !== 100 && (
                                <div style={{marginTop: '11px', color: '#f59e0b', fontSize: '13px'}}>
                                    ⚠️ L'allocazione deve essere esattamente 100% per generare il piano
                                </div>
                            )}
                        </div>
                    </div>

                    {/* NUOVA SEZIONE: Visione e Aspettative */}
                    <div className="card" style={{
                        background: 'linear-gradient(135deg, rgba(139, 92, 246, 0.1) 0%, rgba(59, 130, 246, 0.1) 100%)',
                        border: '2px solid #8b5cf6'
                    }}>
                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '13px'}}>
                            <h3 style={{fontSize: '19px', fontWeight: 'bold', color: '#8b5cf6'}}>
                                🎯 Visione e Aspettative (Avanzato)
                            </h3>
                            <button 
                                className="btn btn-secondary btn-sm"
                                onClick={() => setShowAdvanced(!showAdvanced)}
                            >
                                {showAdvanced ? '▼ Nascondi' : '▶ Espandi'}
                            </button>
                        </div>

                        <div className="info-box" style={{marginBottom: '15px'}}>
                            <strong>💡 Perché è importante:</strong> Queste informazioni permettono all'AI di:
                            <ul style={{marginTop: '7px', paddingLeft: '19px', marginBottom: 0}}>
                                <li>Calcolare probabilità scenari più accurate basate sulle tue convinzioni</li>
                                <li>Validare se il peso degli asset rispecchia davvero le tue aspettative</li>
                                <li>Suggerire strategie specifiche per eventi geopolitici</li>
                                <li>Identificare incoerenze tra visione e portafoglio</li>
                            </ul>
                        </div>

                        {showAdvanced && (
                            <>
                                {/* Obiettivo Principale */}
                                <div style={{marginBottom: '23px'}}>
                                    <h4 style={{fontSize: '17px', fontWeight: 'bold', marginBottom: '11px'}}>
                                        🎯 Obiettivo Principale
                                    </h4>
                                    <div className="grid grid-2">
                                        <div>
                                            <label style={{display: 'block', fontSize: '13px', fontWeight: '600', marginBottom: '7px'}}>
                                                Valore Target (€)
                                            </label>
                                            <input 
                                                type="number"
                                                placeholder="es. 2000000"
                                                value={profile.targetValue}
                                                onChange={e => setProfile({...profile, targetValue: e.target.value})}
                                            />
                                        </div>
                                        <div>
                                            <label style={{display: 'block', fontSize: '13px', fontWeight: '600', marginBottom: '7px'}}>
                                                Obiettivo Principale
                                            </label>
                                            <select
                                                value={profile.mainGoal}
                                                onChange={e => setProfile({...profile, mainGoal: e.target.value})}
                                            >
                                                <option value="">Seleziona...</option>
                                                <option>Pensione anticipata (FIRE)</option>
                                                <option>Accumulazione patrimonio</option>
                                                <option>Rendita passiva</option>
                                                <option>Protezione capitale</option>
                                                <option>Altro</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                {/* Convinzioni Settoriali */}
                                <div style={{marginBottom: '23px'}}>
                                    <h4 style={{fontSize: '17px', fontWeight: 'bold', marginBottom: '11px'}}>
                                        🏭 Convinzioni Settoriali
                                    </h4>
                                    <div style={{fontSize: '11px', color: '#94a3b8', marginBottom: '11px'}}>
                                        Per ogni settore, indica: peso attuale nel portafoglio, livello di convinzione, e motivazione
                                    </div>

                                    {[
                                        { key: 'defense', label: 'Difesa/Armamenti', icon: '🛡️', keywords: ['defense', 'lockheed', 'raytheon', 'northrop', 'bae', 'palantir', 'pltr', 'lmt', 'rtx', 'noc', 'ba', 'gd', 'ldos'] },
                                        { key: 'semiconductors', label: 'Semiconduttori', icon: '💾', keywords: ['tsmc', 'nvidia', 'amd', 'intel', 'asml', 'qualcomm', 'nvda', 'intc', 'qcom', 'avgo', 'broadcom', 'micron', 'mu', 'on', 'semiconductor'] },
                                        { key: 'ai', label: 'Intelligenza Artificiale', icon: '🤖', keywords: ['nvidia', 'microsoft', 'openai', 'anthropic', 'alphabet', 'google', 'nvda', 'msft', 'googl', 'goog', 'meta', 'ibm', 'oracle', 'orcl', 'crwd', 'crowdstrike', 'pltr'] },
                                        { key: 'quantum', label: 'Quantum Computing', icon: '⚛️', keywords: ['ibm', 'google', 'ionq', 'rigetti', 'rgti', 'googl', 'msft', 'honeywell', 'hon'] },
                                        { key: 'energy', label: 'Energia (Rinnovabili)', icon: '⚡', keywords: ['tesla', 'enphase', 'solar', 'nextera', 'tsla', 'enph', 'sedg', 'solaredge', 'nee', 'fslr', 'first solar', 'plug', 'be', 'bloom'] },
                                        { key: 'china', label: 'Esposizione Cina', icon: '🇨🇳', keywords: ['china', 'alibaba', 'tencent', 'baba', 'bidu', 'baidu', 'jd', 'pdd', 'nio', 'xpev', 'li', 'kweb'] }
                                    ].map(sector => {
                                                                            const currentWeight = calculateSectorWeight(sector.keywords);
                                        const conviction = profile.keyConvictions?.[sector.key] || { weight: 0, conviction: 'Neutrale', reasoning: '' };
                                        
                                        return (
                                            <div key={sector.key} style={{
                                                background: '#374151',
                                                padding: '15px',
                                                borderRadius: '11px',
                                                marginBottom: '11px'
                                            }}>
                                                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '11px'}}>
                                                    <div>
                                                        <strong style={{fontSize: '15px'}}>{sector.icon} {sector.label}</strong>
                                                        <div style={{fontSize: '11px', color: '#94a3b8', marginTop: '3px'}}>
                                                            Peso attuale portafoglio: <strong style={{color: '#3b82f6'}}>{currentWeight}%</strong>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="grid grid-3" style={{marginBottom: '11px'}}>
                                                    <div>
                                                        <label style={{display: 'block', fontSize: '11px', marginBottom: '3px'}}>
                                                            Peso Target (%)
                                                        </label>
                                                        <input 
                                                            type="number"
                                                            min="0"
                                                            max="100"
                                                            value={conviction.weight}
                                                            onChange={e => setProfile({
                                                                ...profile,
                                                                keyConvictions: {
                                                                    ...profile.keyConvictions,
                                                                    [sector.key]: {
                                                                        ...conviction,
                                                                        weight: parseInt(e.target.value) || 0
                                                                    }
                                                                }
                                                            })}

                    {/* Genera Piano */}
                    <div className="card">

                        >
                            {investments.length === 0 ? '⚠️ Aggiungi investimenti prima' : 
                            total !== 100 ? '⚠️ Allocazione deve essere 100%' : 
                            '🎯 Genera Piano di Investimento'}
                        </button>
                    </div>

                    {investments.length === 0 && (
                        <div className="warning-box">
                            <h4 style={{fontSize: '17px', fontWeight: 'bold', marginBottom: '7px'}}>💡 Prima di generare il piano</h4>
                            <p style={{color: '#94a3b8'}}>
                                Aggiungi almeno un investimento nel portafoglio per poter generare un piano personalizzato.
                                Il piano terrà conto del tuo valore attuale e delle proiezioni future.
                            </p>

                    )}
                </div>
            );
        };

        // ========== TAB PIANO ==========
        const PlanTab = ({ plan, setActiveTab, profile, setProfile, generatePlan, investments, pacSchedules, planAiAnalysis, setPlanAiAnalysis, setInvestmentPlan }) => {
            const [customYears, setCustomYears] = useState(plan?.timeHorizon || 10);
            const [showAIPrompt, setShowAIPrompt] = useState(false);
            const [showImportAI, setShowImportAI] = useState(false);
            const [aiResponsePlan, setAiResponsePlan] = useState('');
            if (!plan) {
                return (
                    <div className="card" style={{textAlign: 'center', padding: '59px 24px'}}>
                        <div style={{fontSize: '63px', marginBottom: '23px'}}>🎯</div>
                        <h2 style={{fontSize: '31px', fontWeight: 'bold', marginBottom: '15px'}}>Nessun Piano Generato</h2>
                        <p style={{color: '#94a3b8', fontSize: '17px', marginBottom: '31px'}}>
                            Completa la profilazione per generare il tuo piano di investimento personalizzato
                        </p>
                        <button 
                            className="btn btn-primary" 
                            onClick={() => setActiveTab('profilazione')}
                            style={{fontSize: '17px', padding: '15px 31px'}}
                        >
                            Vai alla Profilazione
                        </button>
                    </div>
                );
            }

            const recalculateWithNewYears = () => {
                if (customYears < 1 || customYears > 50) {
                    alert('⚠️ Inserisci un valore tra 1 e 50 anni');
                    return;
                }
                
                // Aggiorna profilo E genera piano in un'unica operazione
                const updatedProfile = {...profile, timeHorizon: customYears};
                setProfile(updatedProfile);
                
                // Aspetta che lo stato sia aggiornato, poi rigenera
                setTimeout(() => {
                    // Forza il refresh del piano chiamando generatePlan direttamente
                    // con il profilo aggiornato
                    generatePlan();
                }, 200);
            };

            const generateAIPromptForPlan = (pacSchedules, investments, profile) => {
            // Raccogli dati PAC
            const pacData = pacSchedules.map(pac => ({
                asset: pac.assetName,
                ticker: pac.ticker,
                type: pac.type,
                monthlyAmount: pac.amount,
                frequency: pac.frequency,
                estimatedPrice: pac.estimatedPrice,
                executions: pac.executionHistory?.length || 0,
                totalInvested: (pac.executionHistory || []).reduce((sum, exec) => sum + exec.amount, 0)
            }));

            const totalPacMonthly = pacSchedules
                .filter(p => p.frequency === 'monthly' && !p.suspended)
                .reduce((sum, p) => sum + p.amount, 0);

            const suspendedPacCount = pacSchedules.filter(p => p.suspended).length;
            const activePacCount = pacSchedules.filter(p => !p.suspended).length;

            // Calcola metriche PAC
            const pacByType = {};
            pacSchedules.forEach(pac => {
                if (pac.frequency === 'monthly' && !pac.suspended) {
                    pacByType[pac.type] = (pacByType[pac.type] || 0) + pac.amount;
                }
            });

            // Dati allocazione target vs attuale
            const currentAllocation = {};
            investments.forEach(inv => {
                const value = inv.quantity * inv.currentPrice;
                currentAllocation[inv.type] = (currentAllocation[inv.type] || 0) + value;
            });

            const totalValue = Object.values(currentAllocation).reduce((a, b) => a + b, 0);
            const currentAllocationPercent = {};
            Object.keys(currentAllocation).forEach(type => {
                currentAllocationPercent[type] = ((currentAllocation[type] / totalValue) * 100).toFixed(1);
            });

            // Calcola deviazioni critiche
            const deviations = {};
            Object.keys(plan.allocation || {}).forEach(type => {
                const target = plan.allocation[type] || 0;
                const current = parseFloat(currentAllocationPercent[type] || 0);
                deviations[type] = {
                    target,
                    current,
                    deviation: current - target,
                    severity: Math.abs(current - target) > 15 ? 'CRITICA' : Math.abs(current - target) > 10 ? 'Alta' : Math.abs(current - target) > 5 ? 'Media' : 'Bassa'
                };
            });

            // Scenari del piano
            const scenariosString = (plan.scenarios || []).map((s, i) => 
                `${i+1}. ${s.name} (${s.probability}%) - Rendimento: ${s.annualReturn?.toFixed(1)}%/anno - Valore finale: €${plan.projectionsDetailed?.[s.name]?.projections?.[`${plan.timeHorizon}year`] || 'N/A'}`
            ).join('\n');

            // Proiezione valore atteso
            const expectedValue = plan.targetValue || 0;
            const currentValue = plan.currentValue || 0;
            const gain = expectedValue - currentValue;
            const gainPercent = currentValue > 0 ? ((gain / currentValue) * 100).toFixed(1) : 0;

            // Calcola mesi al target
            const monthlyContribution = totalPacMonthly;
            const annualReturn = (plan.expectedReturn || 0) / 100;
            const monthsToTarget = currentValue > 0 && monthlyContribution > 0 ? 
                Math.log((expectedValue * (annualReturn / 12)) / (monthlyContribution + (currentValue * (annualReturn / 12)))) / Math.log(1 + (annualReturn / 12)) : 
                plan.timeHorizon * 12;

            const prompt = `Sei un consulente finanziario quantitativo ELITE (CFA Level III, PhD Finanza) specializzato in AUDIT CRITICI di piani di investimento e PAC.

        Il tuo compito è fare un'analisi SPIETATA ma costruttiva. NON essere diplomatico. Identifica OGNI ERRORE, anche piccolo.

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        📊 DATI PORTAFOGLIO E PIANO
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        💰 SITUAZIONE ATTUALE:
        - Valore Portafoglio: €${currentValue.toFixed(0)}
        - Obiettivo (${plan.timeHorizon} anni): €${expectedValue.toFixed(0)}
        - Gap da colmare: €${gain.toFixed(0)} (+${gainPercent}%)
        - Mesi stimati al target: ${Math.round(monthsToTarget)} mesi (${(monthsToTarget/12).toFixed(1)} anni)
        ${monthsToTarget/12 > plan.timeHorizon ? '⚠️ ATTENZIONE: Con PAC attuale NON raggiungi obiettivo in tempo!' : '✅ Su target temporale'}

        📈 STRATEGIA DICHIARATA:
        - Tipo: ${plan.strategy || 'N/A'}
        - Volatilità attesa: ${plan.volatility?.toFixed(1) || 'N/A'}%
        - Rendimento atteso: ${plan.expectedReturn?.toFixed(2) || 'N/A'}%
        - Risk Score: ${plan.portfolioAnalysis?.riskScore || 'N/A'}/10

        💸 CAPACITÀ RISPARMIO:
        - Risparmio mensile dichiarato: €${profile.monthlySavings}
        - PAC mensile attivo: €${totalPacMonthly}
        - Capitale allocato: ${((totalPacMonthly / parseFloat(profile.monthlySavings || 1)) * 100).toFixed(0)}%
        - 🚨 CAPITALE NON UTILIZZATO: €${(parseFloat(profile.monthlySavings || 0) - totalPacMonthly).toFixed(0)}/mese (€${((parseFloat(profile.monthlySavings || 0) - totalPacMonthly) * 12).toFixed(0)}/anno)
        ${(parseFloat(profile.monthlySavings || 0) - totalPacMonthly) > 50 ? '⚠️ GRAVE: Stai lasciando capitale inutilizzato!' : ''}

        👤 PROFILO RISCHIO:
        - Tolleranza dichiarata: ${profile.riskTolerance}
        - Orizzonte: ${plan.timeHorizon} anni
        ${plan.timeHorizon >= 15 && profile.riskTolerance === 'Bassa' ? '⚠️ INCOERENZA: Orizzonte lungo ma rischio basso!' : ''}
        ${plan.timeHorizon <= 5 && profile.riskTolerance === 'Molto Alta' ? '⚠️ INCOERENZA: Orizzonte breve ma rischio alto!' : ''}


        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        🎯 ALLOCAZIONE: TARGET vs REALTÀ vs PAC
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        ${Object.keys(plan.allocation || {}).map(type => {
            const target = plan.allocation[type] || 0;
            const current = parseFloat(currentAllocationPercent[type] || 0);
            const pacAmount = pacByType[type] || 0;
            const pacPercent = totalPacMonthly > 0 ? ((pacAmount / totalPacMonthly) * 100).toFixed(1) : 0;
            const deviation = current - target;
            const dev = deviations[type];
            
            return `📊 ${type}:
        Target:    ${target}%
        Attuale:   ${current}% ${deviation > 0 ? '(+' : '('}${deviation.toFixed(1)}%) ${dev?.severity === 'CRITICA' ? '🚨 DEVIAZIONE CRITICA!' : dev?.severity === 'Alta' ? '⚠️' : ''}
        PAC:       €${pacAmount}/mese (${pacPercent}% del PAC totale)
        ${Math.abs(target - pacPercent) > 10 ? `⚠️ PROBLEMA: PAC al ${pacPercent}% ma target ${target}% - Stai PEGGIORANDO allocazione!` : ''}
        ${deviation > 10 ? `🔴 AZIONE: Devi RIDURRE PAC o vendere` : deviation < -10 ? `🟢 AZIONE: Devi AUMENTARE PAC urgentemente` : ''}`;
        }).join('\n\n')}

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        💰 PAC CONFIGURATI (${pacSchedules.length} attivi)
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        Contributo Mensile Totale: €${totalPacMonthly}
        Contributo Annuale: €${(totalPacMonthly * 12).toFixed(0)}
        Contributo su ${plan.timeHorizon} anni: €${(totalPacMonthly * 12 * plan.timeHorizon).toFixed(0)}

        PAC Attivi: ${activePacCount}
        ${suspendedPacCount > 0 ? `PAC Sospesi: ${suspendedPacCount} (NON conteggiati nel totale)` : ''}

        DETTAGLIO PAC:
        ${pacData.filter(p => {
            const pac = pacSchedules.find(ps => ps.assetName === p.asset);
            return pac && !pac.suspended;
        }).map(p => `- ${p.asset} (${p.type}): €${p.monthlyAmount}/mese, ${p.executions} esecuzioni`).join('\n')}

        ${suspendedPacCount > 0 ? `\nPAC Sospesi (non operativi):\n${pacSchedules.filter(p => p.suspended).map(p => `- ${p.assetName} (${p.type}): €${p.amount}/mese [SOSPESO]`).join('\n')}` : ''}

        🔍 POSSIBILI PROBLEMI DA VERIFICARE:
        ${pacSchedules.length === 0 ? '🚨 ZERO PAC ATTIVI - Stai facendo lump sum? Rischio timing market alto!' : ''}
        ${pacSchedules.length === 1 ? '⚠️ UN SOLO PAC - Concentrazione eccessiva, manca diversificazione temporale' : ''}
        ${totalPacMonthly < 100 ? '⚠️ PAC troppo basso - Commissioni % incidono troppo' : ''}
        ${Object.keys(pacByType).length < 3 ? '⚠️ PAC su meno di 3 categorie - Insufficiente diversificazione' : ''}

        🎯 VISIONE E ASPETTATIVE INVESTITORE
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        ${profile.targetValue ? `💰 Obiettivo: €${parseFloat(profile.targetValue).toLocaleString()} in ${plan.timeHorizon} anni` : 'Obiettivo non specificato'}
        ${profile.mainGoal ? `🎯 Scopo: ${profile.mainGoal}` : ''}

        ${Object.keys(profile.keyConvictions || {}).some(k => profile.keyConvictions[k].weight > 0 || profile.keyConvictions[k].conviction !== 'Neutrale') ? `
        🏭 CONVINZIONI SETTORIALI (peso target vs attuale):
        ${Object.entries(profile.keyConvictions || {})
            .filter(([k,v]) => v.weight > 0 || v.conviction !== 'Neutrale')
            .map(([sector, data]) => {
                const keywords = {
                    defense: ['defense', 'lockheed', 'raytheon', 'northrop'],
                    semiconductors: ['tsmc', 'nvidia', 'amd', 'intel', 'asml'],
                    ai: ['nvidia', 'microsoft', 'openai', 'alphabet'],
                    quantum: ['ibm', 'google', 'ionq'],
                    energy: ['tesla', 'enphase', 'solar'],
                    china: ['china', 'alibaba', 'tencent']
                };
                const totalValue = investments.reduce((s, i) => s + (i.quantity * i.currentPrice), 0);
                const sectorValue = investments.filter(inv => 
                    (keywords[sector] || []).some(kw => inv.name.toLowerCase().includes(kw))
                ).reduce((s, i) => s + (i.quantity * i.currentPrice), 0);
                const currentWeight = totalValue > 0 ? ((sectorValue / totalValue) * 100).toFixed(1) : 0;
                const gap = parseFloat(currentWeight) - data.weight;

    <script>
    // Service Worker per funzionalità offline avanzate
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swCode = `
    // Service Worker v1.0
    const CACHE_NAME = 'portfolio-manager-v1';
    const urlsToCache = [
        './',
        'https://unpkg.com/react@18/umd/react.production.min.js',
        'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
        'https://unpkg.com/@babel/standalone/babel.min.js',
        'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js'
    ];

    self.addEventListener('install', event => {
        event.waitUntil(
            caches.open(CACHE_NAME)
                .then(cache => {
                    console.log('✅ Cache opened');
                    return cache.addAll(urlsToCache);
                })
        );
    });

    self.addEventListener('fetch', event => {
        event.respondWith(
            caches.match(event.request)
                .then(response => {
                    if (response) {
                        return response;
                    }
                    return fetch(event.request);
                }
            )
        );
    });

    self.addEventListener('activate', event => {
        event.waitUntil(
            caches.keys().then(cacheNames => {
                return Promise.all(
                    cacheNames.map(cacheName => {
                        if (cacheName !== CACHE_NAME) {
                            return caches.delete(cacheName);
                        }
                    })
                );
            })
        );
    });
            `;
            
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            
            navigator.serviceWorker.register(swUrl)
                .then(registration => {
                    console.log('✅ Service Worker registrato:', registration);
                })
                .catch(err => {
                    console.log('⚠️ Errore Service Worker:', err);
                });
        });
    }

                ">
                    <div style="font-size: 32px">📱</div>
                    <div style="flex: 1">
                        <div style="font-weight: bold; margin-bottom: 4px">Installa l'App!</div>
                        <div style="font-size: 12px; opacity: 0.9">Accesso rapido e funziona offline</div>
                    </div>
                    <button id="installBtn" style="
                        background: white;
                        color: #3b82f6;
                        border: none;
                        padding: 8px 16px;
                        border-radius: 8px;
                        font-weight: bold;
                        cursor: pointer;
                    ">Installa</button>
                    <button id="dismissBtn" style="
                        background: rgba(255,255,255,0.2);
                        color: white;
                        border: none;
                        padding: 8px 12px;
                        border-radius: 8px;
                        cursor: pointer;
                    ">✕</button>
                </div>
                <style>
                    @keyframes slideUp {
                        from { transform: translateX(-50%) translateY(100px); opacity: 0; }
                        to { transform: translateX(-50%) translateY(0); opacity: 1; }
                    }
                </style>
            `;
            
            document.body.appendChild(installBanner);
            
            document.getElementById('installBtn').addEventListener('click', () => {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('✅ App installata!');
                    }
                    installBanner.remove();
                    deferredPrompt = null;
                });
            });
            
            document.getElementById('dismissBtn').addEventListener('click', () => {
                installBanner.remove();
            });
        }, 3000);
    });

    // Rileva quando l'app è installata
    window.addEventListener('appinstalled', () => {
        console.log('✅ PWA installata con successo!');
        alert('🎉 Portfolio Manager Pro installato!\n\nTrova l\'app nella schermata Home.');
    });
    </script>
</body>
</html>
