    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        // ========== FUNZIONE HELPER CONDIVISA ==========
        const calculatePortfolioMetrics = (investments) => {
            if (!investments || investments.length === 0) {
                return {
                    totalValue: 0,
                    totalInvested: 0,
                    gainLoss: 0,
                    gainLossPercent: 0,
                    uniqueAssets: 0,
                    assetAllocation: {}
                };
            }
            
            const totalValue = investments.reduce((s, i) => s + (i.quantity * i.currentPrice), 0);
            const totalInvested = investments.reduce((s, i) => s + (i.quantity * i.purchasePrice), 0);
            const gainLoss = totalValue - totalInvested;
            const gainLossPercent = totalInvested > 0 ? (gainLoss / totalInvested) * 100 : 0;
            const uniqueAssets = new Set(investments.map(i => i.ticker)).size;
            
            const assetAllocation = {};
            investments.forEach(inv => {
                const value = inv.quantity * inv.currentPrice;
                assetAllocation[inv.type] = (assetAllocation[inv.type] || 0) + value;
            });
            
            return { totalValue, totalInvested, gainLoss, gainLossPercent, uniqueAssets, assetAllocation };
        };
        
        // ========== MERGE ANALISI AI NEL PIANO ==========
        const mergePlanWithAI = (basePlan, aiAnalysis) => {
            if (!aiAnalysis || !basePlan) return basePlan;
            
            console.log('🔀 INIZIO MERGE DETTAGLIATO');
            console.log('Base Plan:', basePlan);
            console.log('AI Analysis:', aiAnalysis);
            
            const merged = { ...basePlan };
            
            // 1. STRATEGIA - Aggiorna sia strategy che strategyGrade
            if (aiAnalysis.executiveSummary?.grade) {
                const gradeMap = {
                    'A': 'Ultra-Aggressiva (Ottimale)',
                    'A-': 'Ultra-Aggressiva',
                    'B+': 'Aggressiva (Ottima)',
                    'B': 'Aggressiva',
                    'B-': 'Bilanciata (Buona)',
                    'C+': 'Bilanciata',
                    'C': 'Conservativa',
                    'C-': 'Conservativa (Critica)',
                    'D': 'Ultra-Conservativa (Migliorabile)',
                    'F': 'Ultra-Conservativa (Critica)'
                };
                
                merged.strategy = gradeMap[aiAnalysis.executiveSummary.grade] || basePlan.strategy;
                merged.strategyGrade = aiAnalysis.executiveSummary.grade;
                merged.strategySource = 'AI';
                
                console.log('✅ Strategia aggiornata:', basePlan.strategy, '→', merged.strategy);
            }
            
            // 2. RISK SCORE
            if (aiAnalysis.auditScore?.riskManagement) {
                merged.aiRiskScore = aiAnalysis.auditScore.riskManagement;
                if (!merged.portfolioAnalysis) {
                    merged.portfolioAnalysis = {};
                }
                merged.portfolioAnalysis.riskScore = aiAnalysis.auditScore.riskManagement;
                
                console.log('✅ Risk Score aggiornato:', basePlan.portfolioAnalysis?.riskScore, '→', merged.aiRiskScore);
            }
            
            // 3. SCENARI - Crea array scenari AI
            if (aiAnalysis.enhancedProjections) {
                merged.scenariosSource = 'AI';
                merged.aiScenarios = [];
                
                Object.entries(aiAnalysis.enhancedProjections).forEach(([scenarioName, data]) => {
                    // Trova scenario base corrispondente per avere tutte le proiezioni
                    const baseScenario = basePlan.scenarios?.find(s => 
                        s.name.toLowerCase().includes(scenarioName.toLowerCase().split(' ')[0])
                    );
                    
                    merged.aiScenarios.push({
                        name: scenarioName,
                        probability: data.adjustedProbability || baseScenario?.probability || 20,
                        annualReturn: data.adjustedReturn || data.expectedReturn || baseScenario?.annualReturn || 0,
                        description: data.reasoning || baseScenario?.description || '',
                        triggers: data.keyAssumptions || baseScenario?.triggers || [],
                        reasoning: data.reasoning || '',
                        aiValidated: true,
                        projections: data.projections || baseScenario?.projections || {}
                    });
                });
                
                console.log('✅ Scenari AI creati:', merged.aiScenarios.length, 'scenari');
                console.log('Probabilità AI:', merged.aiScenarios.map(s => `${s.name}: ${s.probability}%`));
                
                // 4. RENDIMENTO ATTESO - Calcola weighted average dagli scenari AI
                const totalProb = merged.aiScenarios.reduce((sum, s) => sum + (s.probability || 0), 0);
                if (totalProb > 0) {
                    const oldReturn = basePlan.expectedReturn;
                    merged.expectedReturn = merged.aiScenarios.reduce((sum, s) => 
                        sum + ((s.annualReturn || 0) * (s.probability || 0) / totalProb), 0
                    );
                    
                    console.log('✅ Rendimento atteso aggiornato:', oldReturn?.toFixed(2), '% →', merged.expectedReturn.toFixed(2), '%');
                }
                
                // 5. VOLATILITÀ - Calcola da scenari AI
                if (merged.aiScenarios.length > 0) {
                    const returns = merged.aiScenarios.map(s => s.annualReturn);
                    const avgReturn = merged.expectedReturn;
                    const variance = returns.reduce((sum, r) => sum + Math.pow(r - avgReturn, 2), 0) / returns.length;
                    const oldVolatility = basePlan.volatility;
                    merged.volatility = Math.sqrt(variance);
                    
                    console.log('✅ Volatilità aggiornata:', oldVolatility?.toFixed(2), '% →', merged.volatility.toFixed(2), '%');
                }
                
                // 6. PROIEZIONI DETTAGLIATE - Aggiorna con scenari AI
                merged.projectionsDetailed = {};
                merged.aiScenarios.forEach(scenario => {
                    merged.projectionsDetailed[scenario.name] = {
                        probability: scenario.probability,
                        annualReturn: scenario.annualReturn,
                        description: scenario.description,
                        triggers: scenario.triggers,
                        reasoning: scenario.reasoning,
                        projections: scenario.projections
                    };
                });
            }
            
            // 7. RACCOMANDAZIONI
            if (aiAnalysis.criticalFlaws && aiAnalysis.criticalFlaws.length > 0) {
                merged.aiRecommendations = aiAnalysis.criticalFlaws.map(flaw => ({
                    action: flaw.solution || flaw.flaw,
                    reason: flaw.impact || flaw.flaw,
                    priority: flaw.severity === 'CRITICA' ? 'Alta' : flaw.severity === 'Alta' ? 'Media' : 'Bassa',
                    timeframe: flaw.timeframe || 'Breve termine'
                }));
                
                console.log('✅ Raccomandazioni AI:', merged.aiRecommendations.length);
            }
            
            // 8. PAC AUDIT
            if (aiAnalysis.pacAudit) {
                merged.pacAudit = aiAnalysis.pacAudit;
                console.log('✅ PAC Audit presente');
            }
            
            // 9. REBALANCING
            if (aiAnalysis.rebalancingPlan) {
                merged.rebalancingPlan = aiAnalysis.rebalancingPlan;
                console.log('✅ Rebalancing Plan presente');
            }
            
            // 10. FLAG per indicare che l'AI è integrata
            merged._aiIntegrated = true;
            merged._aiIntegratedAt = new Date().toISOString();
            
            console.log('🎯 MERGE COMPLETATO');
            console.log('Strategia finale:', merged.strategy);
            console.log('Rendimento finale:', merged.expectedReturn, '%');
            console.log('Volatilità finale:', merged.volatility, '%');
            console.log('Scenari source:', merged.scenariosSource);
            
            return merged;

            //const forcedInvestments = getForcedInvestmentsData(); // Ensure this variable is defined

            const { totalValue, totalInvested, gainLoss, gainLossPercent } = calculatePortfolioMetrics(currentInvestments);

                const invested = inv.quantity * inv.purchasePrice;
                const gain = value - invested;
                
                if (!byType[inv.type]) {
                    byType[inv.type] = {
                        value: 0,
                        invested: 0,
                        gainLoss: 0,
                        assets: []
                    };
                }
                
                byType[inv.type].value += value;
                byType[inv.type].invested += invested;
                byType[inv.type].gainLoss += gain;
                byType[inv.type].assets.push({
                    name: inv.name,
                    ticker: inv.ticker,
                    value: value,
                    invested: invested,
                    gainLoss: gain,
                    gainLossPercent: invested > 0 ? (gain / invested) * 100 : 0
                });
            });
            
            // Crea snapshot
            const snapshot = {
                id: timestamp,
                date: date,
                totalValue: totalValue,
                totalInvested: totalInvested,
                gainLoss: gainLoss,
                gainLossPercent: gainLossPercent,
                assetCount: currentInvestments.length,
                byType: byType
            };
            
            // Aggiungi allo storico (mantieni ultimi 365 snapshot = ~1 anno se giornalieri)
            setPortfolioHistory(prev => {
                const updated = [...prev, snapshot];
                // Mantieni solo ultimi 365 snapshot
                return updated.slice(-365);
            });
            
            showToast('📸 Snapshot portafoglio salvato nello storico!');

                if (!confirm(

                    'Questa operazione:\n' +
                    '1. Mantiene tutti gli snapshot degli ultimi 30 giorni\n' +
                    '2. Crea snapshot medi settimanali per 31-90 giorni fa\n' +
                    '3. Crea snapshot medi mensili per dati più vecchi\n\n' +
                    'Snapshot attuali: ' + portfolioHistory.length + '\n' +
                    'Snapshot dopo compressione: ~50-100\n\n' +
                    'Procedere?'
                )) {
                     return;
                }
                
                const now = Date.now();
                const day30 = now - (30 * 24 * 60 * 60 * 1000);
                const day90 = now - (90 * 24 * 60 * 60 * 1000);
                
                // Separa snapshot in 3 gruppi
                const recent = portfolioHistory.filter(s => s.id >= day30); // Ultimi 30 giorni - mantieni tutti

                // Funzione per mediare snapshot
                const averageSnapshots = (snapshots) => {
                    if (snapshots.length === 0) return null;
                    
                    const avg = {
                        id: snapshots[Math.floor(snapshots.length / 2)].id, // Usa timestamp medio
                        date: snapshots[Math.floor(snapshots.length / 2)].date,
                        totalValue: snapshots.reduce((sum, s) => sum + s.totalValue, 0) / snapshots.length,
                        totalInvested: snapshots.reduce((sum, s) => sum + s.totalInvested, 0) / snapshots.length,
                        gainLoss: 0,
                        gainLossPercent: 0,
                        assetCount: Math.round(snapshots.reduce((sum, s) => sum + s.assetCount, 0) / snapshots.length),
                        byType: {},
                        isCompressed: true,
                        originalCount: snapshots.length
                    };
                    
                    avg.gainLoss = avg.totalValue - avg.totalInvested;
                    avg.gainLossPercent = avg.totalInvested > 0 ? (avg.gainLoss / avg.totalInvested) * 100 : 0;
                    
                    // Media byType
                    const allTypes = new Set();
                    snapshots.forEach(s => Object.keys(s.byType).forEach(t => allTypes.add(t)));
                    
                    allTypes.forEach(type => {
                        const typeSnapshots = snapshots.filter(s => s.byType[type]);
                        if (typeSnapshots.length > 0) {
                            avg.byType[type] = {
                                value: typeSnapshots.reduce((sum, s) => sum + s.byType[type].value, 0) / typeSnapshots.length,
                                invested: typeSnapshots.reduce((sum, s) => sum + s.byType[type].invested, 0) / typeSnapshots.length,
                                gainLoss: 0,
                                assets: []
                            };
                            avg.byType[type].gainLoss = avg.byType[type].value - avg.byType[type].invested;
                        }
                    });
                    
                    return avg;
                };
                
                // Comprimi snapshot medi (31-90 giorni) in gruppi settimanali
                const weeklyCompressed = [];
                const weekMs = 7 * 24 * 60 * 60 * 1000;
                let currentWeek = [];
                let weekStart = medium.length > 0 ? medium[0].id : now;
                
                medium.forEach(snap => {
                    if (snap.id - weekStart > weekMs) {
                        // Nuova settimana
                        if (currentWeek.length > 0) {
                            const avg = averageSnapshots(currentWeek);
                            if (avg) weeklyCompressed.push(avg);
                        }
                        currentWeek = [snap];
                        weekStart = snap.id;
                    } else {
                        currentWeek.push(snap);
                    }

                if (currentWeek.length > 0) {
                    const avg = averageSnapshots(currentWeek);
                    if (avg) weeklyCompressed.push(avg);

                // Comprimi snapshot vecchi (>90 giorni) in gruppi mensili

                    }
                });
                if (currentMonth.length > 0) {
                    const avg = averageSnapshots(currentMonth);
                    if (avg) monthlyCompressed.push(avg);
