━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
🤖 ANALISI AI PIANO
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

Grade: ${planAiAnalysis.executiveSummary.grade}
Verdict: ${planAiAnalysis.executiveSummary.verdict}

ERRORE PIÙ GRAVE:
${planAiAnalysis.executiveSummary.biggestMistake}

FIX IMMEDIATO:
${planAiAnalysis.executiveSummary.quickestFix}

PROBLEMA FUTURO:
${planAiAnalysis.executiveSummary.longTermIssue}
` : ''}

Generato da Portfolio Manager Pro v5.1
                `.trim();
                
                window.location.href = `mailto:${profile.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                showToast('✅ Client email aperto');
            };

            const generatePlan = () => {
            const total = profile.preferredETF + profile.preferredStocks + profile.preferredCrypto + profile.preferredBonds + profile.preferredCommodities;
            if (total !== 100) {
                showToast('❌ L\'allocazione deve essere esattamente 100%', 'error');
                return;
            }
            
            const monthly = parseFloat(profile.monthlySavings) || 500;
            const years = profile.timeHorizon;
            const current = calculateMetrics.totalValue;
            
            // ========== CALCOLO 5 SCENARI BASATI SU DATI STORICI ==========
            
            // Mappa allocazione utente a rendimenti storici
            const portfolioWeights = {
                etf: profile.preferredETF / 100,
                stocks: profile.preferredStocks / 100,
                crypto: profile.preferredCrypto / 100,
                bonds: profile.preferredBonds / 100,
                commodities: profile.preferredCommodities / 100
            };
            
            // Rendimenti base da dati storici
            const baseReturns = {
                etf: HISTORICAL_DATA['MSCI World'].avgReturn,
                stocks: HISTORICAL_DATA['S&P 500'].avgReturn,
                crypto: Math.min(HISTORICAL_DATA['Bitcoin'].avgReturn, 45), // Cap cripto per realismo
                bonds: HISTORICAL_DATA['US Treasury Bonds'].avgReturn,
                commodities: HISTORICAL_DATA['Gold'].avgReturn
            };
            
            // Calcola rendimento ponderato base
            const baseReturn = 
                baseReturns.etf * portfolioWeights.etf +
                baseReturns.stocks * portfolioWeights.stocks +
                baseReturns.crypto * portfolioWeights.crypto +
                baseReturns.bonds * portfolioWeights.bonds +
                baseReturns.commodities * portfolioWeights.commodities;
            
            // Volatilità portafoglio (semplificato)
            const portfolioVolatility = 
                HISTORICAL_DATA['MSCI World'].volatility * portfolioWeights.etf +
                HISTORICAL_DATA['S&P 500'].volatility * portfolioWeights.stocks +
                Math.min(HISTORICAL_DATA['Bitcoin'].volatility, 60) * portfolioWeights.crypto +
                HISTORICAL_DATA['US Treasury Bonds'].volatility * portfolioWeights.bonds +
                HISTORICAL_DATA['Gold'].volatility * portfolioWeights.commodities;
            
            // ========== 5 SCENARI CON PROBABILITÀ ==========
            // Se esiste analisi AI del piano, usa gli scenari validati dall'AI
            let scenarios;

            if (planAiAnalysis && planAiAnalysis.enhancedProjections) {
                // Usa scenari validati dall'AI
                scenarios = Object.entries(planAiAnalysis.enhancedProjections).map(([scenarioName, data]) => ({
                    name: scenarioName,
                    probability: data.adjustedProbability || 20,
                    annualReturn: data.adjustedReturn || baseReturn,
                    description: data.keyAssumptions?.join(', ') || '',
                    triggers: data.keyAssumptions || [],
                    reasoning: `Scenario validato dall'AI basato su: ${data.keyAssumptions?.join(', ') || 'analisi personalizzata'}`
                }));
            } else {
                // Scenari default se NON c'è analisi AI
                scenarios = [
                    {
                        name: '🛡️ Recessione Severa',
                        probability: 15,
                        returnMultiplier: -1.2,
                        description: 'Recessione globale, crash mercati, tassi alti persistenti',
                        triggers: ['Crisi bancaria sistemica', 'Escalation guerra', 'Debito insostenibile'],
                        annualReturn: Math.max(baseReturn * -0.2, -15),
                        reasoning: 'Scenario pessimistico ma storicamente possibile (2008, 2020, 1973)'
                    },
                    {
                        name: '🐢 Stagnazione',
                        probability: 25,
                        returnMultiplier: 0.4,
                        description: 'Crescita bassa, inflazione persistente, mercati flat',
                        triggers: ['Tassi alti lungo periodo', 'Deglobalizzazione', 'Produttività bassa'],
                        annualReturn: baseReturn * 0.4,
                        reasoning: 'Scenario tipo anni \'70 o Giappone anni \'90'
                    },
                    {
                        name: '⚖️ Crescita Moderata',
                        probability: 35,
                        returnMultiplier: 0.85,
                        description: 'Soft landing, inflazione sotto controllo, crescita stabile',
                        triggers: ['Fed taglia tassi gradualmente', 'No shock geopolitici', 'AI boost produttività'],
                        annualReturn: baseReturn * 0.85,
                        reasoning: 'Scenario base consensus - più probabile secondo analisti'
                    },
                    {
                        name: '🚀 Boom Economico',
                        probability: 20,
                        returnMultiplier: 1.3,
                        description: 'Forte crescita, boom AI/tech, mercati rialzisti',
                        triggers: ['Rivoluzione AI', 'Fine guerre', 'Boom produttività'],
                        annualReturn: baseReturn * 1.3,
                        reasoning: 'Scenario ottimistico tipo anni \'90 o 2010-2021'
                    },
                    {
                        name: '🌋 Superciclo',
                        probability: 5,
                        returnMultiplier: 1.8,
                        description: 'Boom tecnologico/commodities straordinario',
                        triggers: ['AI + fusione nucleare', 'Nuova era tecnologica', 'Domanda emergenti'],
                        annualReturn: baseReturn * 1.8,
                        reasoning: 'Scenario raro ma possibile - tipo post-WW2 o rivoluzione internet'
                    }
                ];
            }
            
            // ========== CALCOLO VALORI FUTURI PER OGNI SCENARIO ==========
            const projectionsDetailed = {};
            
            scenarios.forEach(scenario => {
                const returnRate = scenario.annualReturn / 100;
                const periods = [1, 3, 5, 10, 15, 20, 25, 30];
                
                projectionsDetailed[scenario.name] = {
                    probability: scenario.probability,
                    annualReturn: scenario.annualReturn,
                    description: scenario.description,
                    triggers: scenario.triggers,
                    reasoning: scenario.reasoning,
                    projections: {}
                };
                
                periods.forEach(year => {
                    if (year <= years) {
                        // Formula compound con contributi mensili
                        const futureValue = 
                            current * Math.pow(1 + returnRate, year) +
                            monthly * 12 * ((Math.pow(1 + returnRate, year) - 1) / returnRate);
                        
                        projectionsDetailed[scenario.name].projections[`${year}year`] = Math.round(futureValue);
                    }
                });
            });
            
            // ========== VALORE ATTESO (WEIGHTED AVERAGE) ==========
            const expectedReturn = scenarios.reduce((sum, s) => sum + (s.annualReturn * s.probability / 100), 0);
            const expectedValue = 
                current * Math.pow(1 + expectedReturn / 100, years) +
                monthly * 12 * ((Math.pow(1 + expectedReturn / 100, years) - 1) / (expectedReturn / 100));
            
            // ========== ANALISI PORTAFOGLIO VS OBIETTIVO ==========
            const portfolioAnalysis = analyzePortfolioForGoal(
                investments, 
                profile, 
                expectedValue,
                portfolioWeights,
                baseReturn,
                portfolioVolatility
            );
            
            setInvestmentPlan({
                strategy: getStrategyName(portfolioWeights, baseReturn),
                expectedReturn: expectedReturn,
                baseReturn: baseReturn,
                volatility: portfolioVolatility,
                targetValue: Math.round(expectedValue),
                currentValue: current,
                monthlyContribution: monthly,
                timeHorizon: years,
                allocation: {
                    'ETF': profile.preferredETF,
                    'Azioni': profile.preferredStocks,
                    'Criptovalute': profile.preferredCrypto,
                    'Obbligazioni': profile.preferredBonds,
                    'Commodities': profile.preferredCommodities
                },
                scenarios: scenarios,
                projectionsDetailed: projectionsDetailed,
                portfolioAnalysis: portfolioAnalysis,
                recommendations: generateRecommendations(portfolioWeights, baseReturn, portfolioVolatility, years),
                macroContext: MACRO_CONTEXT_2025,
                historicalBasis: {
                    sp500: HISTORICAL_DATA['S&P 500'],
                    world: HISTORICAL_DATA['MSCI World'],
                    bonds: HISTORICAL_DATA['US Treasury Bonds'],
                    gold: HISTORICAL_DATA['Gold']
                }
            });
            
            showToast('✅ Piano avanzato generato con 5 scenari!');
            setActiveTab('piano');
        };

        // ========== FUNZIONI HELPER ==========
        const getStrategyName = (weights, baseReturn) => {
            // Converti da decimale a percentuale (0.4 → 40)
            const equityWeight = (weights.etf + weights.stocks + weights.crypto) * 100;
            
            if (equityWeight < 30) return 'Ultra-Conservativa';
            if (equityWeight < 50) return 'Conservativa';
            if (equityWeight < 70) return 'Bilanciata';
            if (equityWeight < 85) return 'Aggressiva';
            return 'Ultra-Aggressiva';
        };

        const analyzePortfolioForGoal = (investments, profile, expectedValue, weights, baseReturn, volatility) => {
            const currentByType = {};
            investments.forEach(inv => {
                const value = inv.quantity * inv.currentPrice;
                currentByType[inv.type] = (currentByType[inv.type] || 0) + value;
            });
            
            const totalCurrent = Object.values(currentByType).reduce((a, b) => a + b, 0);
            const currentWeights = {
                ETF: ((currentByType['ETF'] || 0) / totalCurrent) * 100,
                Azioni: ((currentByType['Azioni'] || 0) / totalCurrent) * 100,
                Criptovalute: ((currentByType['Criptovalute'] || 0) / totalCurrent) * 100,
                Obbligazioni: ((currentByType['Obbligazioni'] || 0) / totalCurrent) * 100,
                Commodities: ((currentByType['Commodities'] || 0) / totalCurrent) * 100
            };
            
            const deviations = {
                ETF: profile.preferredETF - currentWeights.ETF,
                Azioni: profile.preferredStocks - currentWeights.Azioni,
                Criptovalute: profile.preferredCrypto - currentWeights.Criptovalute,
                Obbligazioni: profile.preferredBonds - currentWeights.Obbligazioni,
                Commodities: profile.preferredCommodities - currentWeights.Commodities
            };
            
            const needsRebalancing = Object.values(deviations).some(d => Math.abs(d) > 10);
            
            return {
                currentWeights,
                targetWeights: {
                    ETF: profile.preferredETF,
                    Azioni: profile.preferredStocks,
                    Criptovalute: profile.preferredCrypto,
                    Obbligazioni: profile.preferredBonds,
                    Commodities: profile.preferredCommodities
                },
                deviations,
                needsRebalancing,
                rebalancingActions: generateRebalancingActions(deviations, totalCurrent),
                riskScore: calculateRiskScore(weights, volatility),
                alignmentScore: calculateAlignmentScore(deviations)
            };
        };

        const generateRebalancingActions = (deviations, totalValue) => {
            const actions = [];
            Object.entries(deviations).forEach(([type, deviation]) => {
                if (Math.abs(deviation) > 5) {
                    const amount = (Math.abs(deviation) / 100) * totalValue;
                    actions.push({
                        type,
                        action: deviation > 0 ? 'Aumentare' : 'Ridurre',
                        currentDeviation: deviation.toFixed(1),
                        suggestedAmount: amount.toFixed(0),
                        priority: Math.abs(deviation) > 15 ? 'Alta' : Math.abs(deviation) > 10 ? 'Media' : 'Bassa'
                    });
                }
            });
            return actions.sort((a, b) => Math.abs(b.currentDeviation) - Math.abs(a.currentDeviation));
        };

        const calculateRiskScore = (weights, volatility) => {
            const equityWeight = weights.etf + weights.stocks + weights.crypto;
            const riskScore = (equityWeight * 0.7 + (volatility / 20) * 0.3) * 10;
            return Math.min(Math.round(riskScore), 10);
        };

        const calculateAlignmentScore = (deviations) => {
            const totalDeviation = Object.values(deviations).reduce((sum, d) => sum + Math.abs(d), 0);
            return Math.max(0, Math.round(100 - totalDeviation));
        };

        const generateRecommendations = (weights, baseReturn, volatility, years) => {
            const recommendations = [];
            const equityWeight = weights.etf + weights.stocks + weights.crypto;
            
            if (equityWeight > 80 && years < 5) {
                recommendations.push({
                    asset: 'US Treasury Bonds (TLT)',
                    reason: 'Portafoglio troppo aggressivo per orizzonte breve. Bonds riducono volatilità.',
                    allocation: 20,
                    priority: 'Alta'
                });
            }
            
            if (weights.etf < 0.3 && equityWeight > 0.5) {
                recommendations.push({
                    asset: 'Vanguard FTSE All-World (VWCE)',
                    reason: 'ETF globale diversificato - base solida per ogni portafoglio.',
                    allocation: 30,
                    priority: 'Alta'
                });
            }
            
            if (weights.bonds < 0.1 && years > 10) {
                recommendations.push({
                    asset: 'iShares Core US Aggregate Bond (AGG)',
                    reason: 'Bonds per stabilizzare portafoglio e ridurre drawdown.',
                    allocation: 15,
                    priority: 'Media'
                });
            }
            
            if (years > 15 && weights.commodities < 0.05) {
                recommendations.push({
                    asset: 'SPDR Gold Shares (GLD)',
                    reason: 'Oro come hedge inflazione e protezione crisi.',
                    allocation: 10,
                    priority: 'Media'
                });
            }
            
            return recommendations;
        };

            return (
                <div className="container">
                    {toast && <div className={`toast toast-${toast.type}`}>{toast.msg}</div>}
                    
                    <header style={{textAlign: 'center', marginBottom: '31px'}}>
                        <h1 style={{fontSize: '37px', fontWeight: 'bold', marginBottom: '7px', background: 'linear-gradient(135deg, #3b82f6, #8b5cf6)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent'}}>
                            Portfolio Manager Pro
                        </h1>
                        <p style={{color: '#94a3b8', fontSize: '13px'}}>v5.1 - Gestione Completa • Analisi AI • PAC • Import/Export</p>
                    </header>

                    <nav className="nav">
                        {['dashboard', 'storico', 'pac', 'portafoglio', 'analisi', 'piano', 'profilazione'].map(tab => (
                            <button
                                key={tab}
                                className={`nav-btn ${activeTab === tab ? 'active' : ''}`}
                                onClick={() => setActiveTab(tab)}
                            >
                                {tab.charAt(0).toUpperCase() + tab.slice(1)}
                            </button>
                        ))}
                    </nav>

                    {activeTab === 'portafoglio' && (
                        <PortfolioTab 
                            groupedInvestments={groupedInvestments}
                            addInvestment={addInvestment} 
                            startStaking={startStaking}
                            stakingPositions={stakingPositions}
                            updateInvestment={updateInvestment}
                            deleteInvestment={deleteInvestment}
                            sellInvestment={sellInvestment}
                            setEditModal={setEditModal}
                        />
                    )}
                    
                    {activeTab === 'dashboard' && <DashboardTab 
                        investments={investments} 
                        soldInvestments={soldInvestments}
                        stakingPositions={stakingPositions}
                        processStakingRewards={processStakingRewards} 
                        toggleStaking={toggleStaking}
                        endStaking={endStaking}
                        editStakingStartDate={editStakingStartDate}
                        metrics={calculateMetrics} 
                        updatePrices={updatePrices} 
                        exportCSV={exportCSV} 
                        exportJSON={exportJSON} 
                        importJSON={importJSON} 
                        loading={loading} 
                        lastPriceUpdate={lastPriceUpdate}
                        profile={profile}
                        pacSchedules={pacSchedules}
                        investmentPlan={investmentPlan}
                        aiAnalysis={aiAnalysis}
                        setInvestments={setInvestments}
                        setLastPriceUpdate={setLastPriceUpdate}
                        createPortfolioSnapshot={createPortfolioSnapshot}
                        showToast={showToast}
                        planAiAnalysis={planAiAnalysis}
                        analysisHistory={analysisHistory}
                        portfolioHistory={portfolioHistory}
                        aiAnalysisHistory={aiAnalysisHistory}
                        setStakingPositions={setStakingPositions}
                    />}
                    {activeTab === 'storico' && (
                        <HistoryTab 
                            portfolioHistory={portfolioHistory}
                            investments={investments}
                            pacSchedules={pacSchedules}  // ← AGGIUNGI QUESTA RIGA
                            setPortfolioHistory={setPortfolioHistory}
                            createPortfolioSnapshot={createPortfolioSnapshot}
                            deleteSnapshot={deleteSnapshot}
                            clearOldSnapshots={clearOldSnapshots}
                            compressHistory={compressHistory}
                            showToast={showToast}
                        />
                    )}
                    {activeTab === 'pac' && (
                        <PACTab 
                            pacSchedules={pacSchedules} 
                            setPacSchedules={setPacSchedules} 
                            addInvestment={addInvestment} 
                            showToast={showToast}
                            investments={investments}
                        />
                    )}
                    
                    {activeTab === 'analisi' && (
                        <AnalysisTab 
                            aiAnalysis={aiAnalysis}
                            generateAIAnalysis={generateAIAnalysis}
                            loading={loading}
                            investments={investments}
                            profile={profile}
                            analysisHistory={analysisHistory}
                            setAnalysisHistory={setAnalysisHistory}
                            setAiAnalysis={setAiAnalysis}
                            calculateMetrics={calculateMetrics}
                        />
                    )}                    
                    {activeTab === 'profilazione' && (
                        <ProfileTab 
                            profile={profile} 
                            setProfile={setProfile} 
                            generatePlan={generatePlan}
                            investments={investments}
                        />
                    )}
                    
                    {activeTab === 'piano' && (
                        <PlanTab 
                            plan={investmentPlan} 
                            setActiveTab={setActiveTab}
                            profile={profile}
                            setProfile={setProfile}
                            generatePlan={generatePlan}
                            investments={investments}
                            pacSchedules={pacSchedules}
                            planAiAnalysis={planAiAnalysis}
                            setPlanAiAnalysis={setPlanAiAnalysis}
                            setInvestmentPlan={setInvestmentPlan}
                        />
                    )}
                    {/* MODAL MODIFICA */}
                    {editModal && (
                        <div className="modal" onClick={() => setEditModal(null)}>
                            <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                                <h2 style={{fontSize: '23px', fontWeight: 'bold', marginBottom: '19px'}}>✏️ Modifica Investimento</h2>
                                <EditForm 
                                    investment={editModal} 
                                    onSave={(updates) => {
                                        updateInvestment(editModal.id, updates);
                                        setEditModal(null);
                                    }}
                                    onCancel={() => setEditModal(null)}
                                />
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ========== COMPONENTE MODIFICA ==========
        const EditForm = ({ investment, onSave, onCancel }) => {
            const [form, setForm] = useState({
                name: investment.name,
                ticker: investment.ticker,
                isin: investment.isin || '',
                type: investment.type,
                quantity: investment.quantity,
                purchasePrice: investment.purchasePrice,
                purchaseDate: investment.purchaseDate
            });

            return (
                <div>
                    <div className="grid grid-2">
                        <input 
                            placeholder="Nome" 
                            value={form.name} 
                            onChange={e => setForm({...form, name: e.target.value})} 
                        />
                        <input 
                            placeholder="Ticker" 
                            value={form.ticker} 
                            onChange={e => setForm({...form, ticker: e.target.value.toUpperCase()})} 
                        />
                        <input 
                            placeholder="ISIN" 
                            value={form.isin} 
                            onChange={e => setForm({...form, isin: e.target.value.toUpperCase()})} 
                        />
                        <select value={form.type} onChange={e => setForm({...form, type: e.target.value})}>
                            <option>ETF</option>
                            <option>Azioni</option>
                            <option>Criptovalute</option>
                            <option>Obbligazioni</option>
                            <option>Commodities</option>
                        </select>
                        <input 
                            type="number" 
                            step="0.00001" 
                            placeholder="Quantità" 
                            value={form.quantity} 
                            onChange={e => setForm({...form, quantity: parseFloat(e.target.value)})} 
                        />
                        <input 
                            type="number" 
                            step="0.01" 
                            placeholder="Prezzo Acquisto" 
                            value={form.purchasePrice} 
                            onChange={e => setForm({...form, purchasePrice: parseFloat(e.target.value)})} 
                        />
                        <input 
                            type="date" 
                            value={form.purchaseDate} 
                            onChange={e => setForm({...form, purchaseDate: e.target.value})} 
                        />
                    </div>
                    <div style={{display: 'flex', gap: '11px', marginTop: '19px'}}>
                        <button className="btn btn-secondary" onClick={onCancel} style={{flex: 1}}>Annulla</button>
                        <button className="btn btn-primary" onClick={() => onSave(form)} style={{flex: 1}}>Salva</button>
                    </div>
                </div>
            );
        };

        // ========== TAB PORTAFOGLIO ==========
        const PortfolioTab = ({ groupedInvestments, addInvestment, updateInvestment, deleteInvestment, startStaking, stakingPositions, sellInvestment, setEditModal }) => {
    
            const safeStakingPositions = stakingPositions || [];
            
            const [searchTerm, setSearchTerm] = useState('');
            const [filterType, setFilterType] = useState('Tutti');
            const [sortBy, setSortBy] = useState('value');
            const [expandedAssets, setExpandedAssets] = useState(new Set());
            const [showNewInvestmentForm, setShowNewInvestmentForm] = useState(false);
            const [form, setForm] = useState({ 
                name: '', 
                ticker: '', 
                isin: '', 
                type: 'ETF', 
                quantity: '', 
                purchasePrice: '',
                purchaseDate: new Date().toISOString().split('T')[0]
            });
            const [selectedAsset, setSelectedAsset] = useState(null);
            // Filtra e ordina asset
            const filteredAndSortedAssets = useMemo(() => {
                let result = [...groupedInvestments];
                
                // Filtro per ricerca
                if (searchTerm) {
                    result = result.filter(g => 
                        g.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                        g.ticker.toLowerCase().includes(searchTerm.toLowerCase())
                    );
                }
                
                // Filtro per tipo
                if (filterType !== 'Tutti') {
                    result = result.filter(g => g.type === filterType);
                }
                
                // Ordinamento
                result.sort((a, b) => {
                    const aValue = a.lots.reduce((sum, lot) => sum + (lot.quantity * a.currentPrice), 0);
                    const bValue = b.lots.reduce((sum, lot) => sum + (lot.quantity * b.currentPrice), 0);
                    const aInvested = a.lots.reduce((sum, lot) => sum + (lot.quantity * lot.purchasePrice), 0);
                    const bInvested = b.lots.reduce((sum, lot) => sum + (lot.quantity * lot.purchasePrice), 0);
                    const aGainPercent = ((aValue - aInvested) / aInvested) * 100;
                    const bGainPercent = ((bValue - bInvested) / bInvested) * 100;
                    
                    switch(sortBy) {
                        case 'name': return a.name.localeCompare(b.name);
                        case 'value': return bValue - aValue;
                        case 'gain': return bGainPercent - aGainPercent;
                        default: return 0;
                    }
                });
                
                return result;
            }, [groupedInvestments, searchTerm, filterType, sortBy]);

            const toggleAsset = (key) => {
                setExpandedAssets(prev => {
                    const next = new Set(prev);
                    if (next.has(key)) {
                        next.delete(key);
                    } else {
                        next.add(key);
                    }
                    return next;
                });
            };
            const handleSubmit = () => {
                // Validazione campi obbligatori
                if (!form.name || !form.ticker || !form.quantity || !form.purchasePrice) {
                    alert('Compila tutti i campi obbligatori (Nome, Ticker, Quantità, Prezzo)');
                    return;
                }
                
                // Validazione valori numerici
                const quantity = parseFloat(form.quantity);
                const price = parseFloat(form.purchasePrice);
                
                if (isNaN(quantity) || quantity <= 0) {
                    alert('❌ Errore: La quantità deve essere un numero positivo maggiore di 0');
                    return;
                }
                
                if (isNaN(price) || price <= 0) {
                    alert('❌ Errore: Il prezzo deve essere un numero positivo maggiore di 0');
                    return;
                }
                
                // Validazione ISIN (se non crypto)
                if (form.type !== 'Criptovalute' && form.isin) {
                    const isinRegex = /^[A-Z]{2}[A-Z0-9]{9}[0-9]$/;
                    if (!isinRegex.test(form.isin.toUpperCase())) {
                        const confirmInvalid = confirm(
                            '⚠️ ATTENZIONE: ISIN non valido\n\n' +
                            'Formato corretto: 2 lettere + 9 caratteri alfanumerici + 1 numero\n' +
                            'Esempio: US0378331005 (Apple)\n\n' +
                            'Vuoi procedere comunque?'
                        );
                        if (!confirmInvalid) return;
                    }
                }
                
                addInvestment({ 
                    ...form, 
                    quantity: parseFloat(form.quantity), 
                    purchasePrice: parseFloat(form.purchasePrice) 
                });
                
                // Se è selezionato un asset, mantieni i dati per DCA
                if (selectedAsset) {
                    setForm({
                        name: selectedAsset.name,
                        ticker: selectedAsset.ticker,
                        isin: selectedAsset.isin || '',
                        type: selectedAsset.type,
                        quantity: '',
                        purchasePrice: '',
                        purchaseDate: new Date().toISOString().split('T')[0]
                    });
                } else {
                    setForm({ 
                        name: '', ticker: '', isin: '', type: 'ETF', 
                        quantity: '', purchasePrice: '',
                        purchaseDate: new Date().toISOString().split('T')[0]
                    });
                }
            };

            return (
                <div>
                    <div className="card">
                        <div 
                            style={{
                                display: 'flex', 
                                justifyContent: 'space-between', 
                                alignItems: 'center', 
                                marginBottom: showNewInvestmentForm ? '15px' : '0',
                                cursor: 'pointer',
                                padding: '7px',
                                borderRadius: '7px',
                                transition: 'background 0.2s'
                            }}
                            onClick={() => setShowNewInvestmentForm(!showNewInvestmentForm)}
                            onMouseEnter={(e) => e.currentTarget.style.background = '#374151'}
                            onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}
                        >
                            <div>
                                <h3 style={{fontSize: '19px', fontWeight: 'bold', margin: 0}}>
                                    {selectedAsset ? '🔄 Aggiungi Lotto (DCA)' : '➕ Nuovo Investimento'}
                                </h3>
                                {!showNewInvestmentForm && (
                                    <p style={{color: '#94a3b8', margin: 0, fontSize: '13px'}}>
                                        {selectedAsset ? `Aggiungi lotto per ${selectedAsset.name}` : 'Clicca per aggiungere un investimento'}
                                    </p>
                                )}
                            </div>
                            <div style={{fontSize: '19px', fontWeight: 'bold', color: '#a1a1a1'}}>
                                {showNewInvestmentForm ? '▼ Nascondi' : '▶ Espandi'}
                            </div>
                        </div>
                        
                        {showNewInvestmentForm && (
                            <>
                                {selectedAsset && (
                                    <p style={{color: '#94a3b8', marginBottom: '15px'}}>
                                        Aggiungi un nuovo lotto per: <strong style={{color: '#3b82f6'}}>{selectedAsset.name}</strong>
                                    </p>
                                )}
                        
                                <div className="grid grid-3">
                                    <input 
                                        placeholder="Nome Asset *" 
                                        value={form.name} 
                                        onChange={e => setForm({...form, name: e.target.value})}
                                        disabled={!!selectedAsset}
                                    />
                                    <input 
                                        placeholder="Ticker * (es. AAPL, VWCE.MI)" 
                                        value={form.ticker} 
                                        onChange={e => setForm({...form, ticker: e.target.value.toUpperCase()})}
                                        disabled={!!selectedAsset}
                                    />
                                    <input 
                                        placeholder="ISIN (opzionale per crypto)" 
                                        value={form.isin} 
                                        onChange={e => setForm({...form, isin: e.target.value.toUpperCase()})}
                                        disabled={!!selectedAsset}
                                    />
                                    <select 
                                        value={form.type} 
                                        onChange={e => setForm({...form, type: e.target.value})}
                                        disabled={!!selectedAsset}
                                    >
                                        <option>ETF</option>
                                        <option>Azioni</option>
                                        <option>Criptovalute</option>
                                        <option>Obbligazioni</option>
                                        <option>Commodities</option>
                                    </select>
                                    <input 
                                        type="number" 
                                        step="0.00001" 
                                        placeholder="Quantità *" 
                                        value={form.quantity} 
                                        onChange={e => setForm({...form, quantity: e.target.value})} 
                                    />
                                    <input 
                                        type="number" 
                                        step="0.01" 
                                        placeholder="Prezzo Acquisto (€) *" 
                                        value={form.purchasePrice} 
                                        onChange={e => setForm({...form, purchasePrice: e.target.value})} 
                                    />
                                    <input 
                                        type="date" 
                                        value={form.purchaseDate} 
                                        onChange={e => setForm({...form, purchaseDate: e.target.value})} 
                                    />
                                </div>
                                
                                <div style={{display: 'flex', gap: '11px', marginTop: '15px'}}>
                                    <button className="btn btn-primary" onClick={handleSubmit} style={{flex: 1}}>
                                        {selectedAsset ? '🔄 Aggiungi Lotto' : '➕ Aggiungi Investimento'}
                                    </button>
                                    {selectedAsset && (
                                        <button 
                                            className="btn btn-secondary" 
                                            onClick={() => {
                                                setSelectedAsset(null);
                                                setForm({ 
                                                    name: '', ticker: '', isin: '', type: 'ETF', 
                                                    quantity: '', purchasePrice: '',
                                                    purchaseDate: new Date().toISOString().split('T')[0]
                                                });
                                            }}
                                        >
                                            ✕ Annulla
                                        </button>
                                    )}
                                </div>
                            </>
                        )}
                    </div>

                    {groupedInvestments.length > 0 && (
                        <div className="card">
                            <h3 style={{fontSize: '19px', fontWeight: 'bold', marginBottom: '13px'}}>
                                💼 I Tuoi Investimenti ({groupedInvestments.reduce((acc, g) => acc + g.lots.length, 0)} lotti in {groupedInvestments.length} asset)
                            </h3>

                            {/* Barra ricerca e filtri */}
                            <div style={{marginBottom: '19px', display: 'flex', gap: '11px', flexWrap: 'wrap'}}>
                                <input 
                                    type="text"
                                    placeholder="🔍 Cerca asset (nome o ticker)..."
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    style={{flex: '1 1 300px', marginBottom: '0'}}
                                />
                                <select 
                                    value={filterType}
                                    onChange={(e) => setFilterType(e.target.value)}
                                    style={{flex: '0 0 150px', marginBottom: '0'}}
                                >
                                    <option>Tutti</option>
                                    <option>ETF</option>
                                    <option>Azioni</option>
                                    <option>Criptovalute</option>
                                    <option>Obbligazioni</option>
                                    <option>Commodities</option>
                                </select>
                                <select 
                                    value={sortBy}
                                    onChange={(e) => setSortBy(e.target.value)}
                                    style={{flex: '0 0 150px', marginBottom: '0'}}
                                >
                                    <option value="value">💰 Valore</option>
                                    <option value="gain">📈 Gain/Loss %</option>
                                    <option value="name">📊 Nome</option>
                                </select>
                            </div>

                            {/* Vista Card Compatta */}
                            <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: '11px'}}>
                                {filteredAndSortedAssets.map(group => {
                                    const totalQty = group.lots.reduce((s, l) => s + l.quantity, 0);
                                    const totalValue = group.lots.reduce((s, l) => s + (l.quantity * group.currentPrice), 0);
                                    const totalInvested = group.lots.reduce((s, l) => s + (l.quantity * l.purchasePrice), 0);
                                    const totalGain = totalValue - totalInvested;
                                    const totalGainPercent = totalInvested > 0 ? (totalGain / totalInvested) * 100 : 0;
                                    const assetKey = group.isin || group.ticker;
                                    const isExpanded = expandedAssets.has(assetKey);
                                    const avgPrice = totalInvested / totalQty;
                                    return (
                                        <div key={assetKey}>
                                            {/* Card Mini */}
                                            <div 
                                                style={{
                                                    background: '#374151',
                                                    borderRadius: '11px',
                                                    padding: '15px',
                                                    cursor: 'pointer',
                                                    transition: 'all 0.2s',
                                                    border: '2px solid transparent',
                                                    borderColor: isExpanded ? '#3b82f6' : 'transparent'
                                                }}
                                                onClick={() => toggleAsset(assetKey)}
                                                onMouseEnter={(e) => e.currentTarget.style.transform = 'translateY(-2px)'}
                                                onMouseLeave={(e) => e.currentTarget.style.transform = 'translateY(0)'}
                                            >
                                                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'start', marginBottom: '7px'}}>
                                                    <div style={{flex: 1}}>
                                                        <div style={{fontSize: '15px', fontWeight: 'bold', marginBottom: '3px'}}>{group.name}</div>
                                                        <div style={{fontSize: '11px', color: '#94a3b8'}}>
                                                            {group.ticker} • {group.type}
                                                        </div>
                                                    </div>
                                                    <span className={`badge badge-${group.type === 'ETF' ? 'blue' : group.type === 'Azioni' ? 'green' : group.type === 'Criptovalute' ? 'yellow' : 'blue'}`} style={{fontSize: '9px'}}>
                                                        {group.lots.length} lott{group.lots.length > 1 ? 'i' : 'o'}
                                                    </span>
                                                </div>
                                                
                                                <div style={{fontSize: '23px', fontWeight: 'bold', marginBottom: '3px'}}>
                                                    €{totalValue.toFixed(2)}
                                                </div>
                                                
                                                <div style={{fontSize: '13px', fontWeight: '600', color: totalGain >= 0 ? '#10b981' : '#ef4444'}}>
                                                    {totalGain >= 0 ? '+' : ''}€{totalGain.toFixed(2)} ({totalGainPercent.toFixed(1)}%)
                                                </div>
                                                
                                                <div style={{fontSize: '11px', color: '#94a3b8', marginTop: '7px', lineHeight: '1.5'}}>
                                                    <div>Qtà: {totalQty.toFixed(4)} • Prezzo: €{group.currentPrice.toFixed(4)}</div>
                                                    <div>Investito: €{totalInvested.toFixed(0)} • Prezzo medio: €{avgPrice.toFixed(2)}</div>
                                                </div>
                                            </div>

                                            {/* Bottone Staking - SOLO per Crypto */}
                                            {group.type === 'Criptovalute' && (
                                                <button 
                                                    className="btn btn-sm"
                                                    style={{
                                                        width: '100%',
                                                        marginTop: '8px',
                                                        fontSize: '13px',
                                                        padding: '10px',
                                                        background: 'linear-gradient(135deg, #f59e0b 0%, #d97706 100%)',
                                                        color: 'white',
                                                        fontWeight: '600',
                                                        display: 'flex',
                                                        alignItems: 'center',
                                                        justifyContent: 'center',
                                                        gap: '8px'
                                                    }}
                                                    onClick={(e) => {
                                                        e.stopPropagation();
                                                        // Passa il gruppo invece del lotto
                                                        startStaking({
                                                            name: group.name,
                                                            ticker: group.ticker,
                                                            type: group.type,
                                                            currentPrice: group.currentPrice
                                                        });
                                                    }}
                                                >
                                                    🌟 Gestisci Staking ({totalQty.toFixed(4)} {group.ticker})
                                                </button>
                                            )}

                                            {/* Dettagli espansi */}
                                            {isExpanded && (
                                                <div style={{
                                                    background: '#1e293b',
                                                    borderRadius: '11px',
                                                    padding: '15px',
                                                    marginTop: '7px',
                                                    border: '2px solid #3b82f6'
                                                }}>
                                                    <button 
                                                        className="btn btn-primary btn-sm" 
                                                        onClick={(e) => {
                                                            e.stopPropagation();
                                                            setSelectedAsset(group);
                                                            setForm({
                                                                name: group.name,
                                                                ticker: group.ticker,
                                                                isin: group.isin || '',
                                                                type: group.type,
                                                                quantity: '',
                                                                purchasePrice: '',
                                                                purchaseDate: new Date().toISOString().split('T')[0]
                                                            });
                                                            window.scrollTo({ top: 0, behavior: 'smooth' });
                                                        }}
                                                        style={{width: '100%', marginBottom: '11px'}}
                                                    >
                                                        🔄 Aggiungi Lotto (DCA)
                                                    </button>

                                                    <div style={{fontSize: '13px', fontWeight: 'bold', marginBottom: '11px', borderBottom: '1px solid #374151', paddingBottom: '7px'}}>
                                                        📋 {group.lots.length} Lotti
                                                    </div>

                                                    {group.lots.map(lot => {
                                                        const lotValue = lot.quantity * group.currentPrice;
                                                        const lotInvested = lot.quantity * lot.purchasePrice;
                                                        const lotGain = lotValue - lotInvested;
                                                        const lotGainPercent = (lotGain / lotInvested) * 100;

                                                        return (
                                                            <div key={lot.id} style={{
                                                                background: '#374151',
                                                                padding: '11px',
                                                                borderRadius: '7px',
                                                                marginBottom: '7px',
                                                                fontSize: '13px'
                                                            }}>
                                                                <div style={{display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '7px', marginBottom: '9px'}}>
                                                                    <div>
                                                                        <div style={{color: '#94a3b8', fontSize: '11px'}}>Data</div>
                                                                        <div style={{fontWeight: '600'}}>{lot.purchaseDate}</div>
                                                                    </div>
                                                                    <div>
                                                                        <div style={{color: '#94a3b8', fontSize: '11px'}}>Quantità</div>
                                                                        <div style={{fontWeight: '600'}}>{lot.quantity}</div>
                                                                    </div>
                                                                    <div>
                                                                        <div style={{color: '#94a3b8', fontSize: '11px'}}>Prezzo Acq.</div>
                                                                        <div style={{fontWeight: '600'}}>€{lot.purchasePrice.toFixed(2)}</div>
                                                                    </div>
                                                                    <div>
                                                                        <div style={{color: '#94a3b8', fontSize: '11px'}}>Valore</div>
                                                                        <div style={{fontWeight: '600'}}>€{lotValue.toFixed(2)}</div>
                                                                    </div>
                                                                    <div>
                                                                        <div style={{color: '#94a3b8', fontSize: '11px'}}>Gain/Loss</div>
                                                                        <div style={{fontWeight: '600', color: lotGain >= 0 ? '#10b981' : '#ef4444'}}>
                                                                            {lotGain >= 0 ? '+' : ''}€{lotGain.toFixed(2)}
                                                                        </div>
                                                                    </div>
                                                                    <div>
                                                                        <div style={{color: '#94a3b8', fontSize: '11px'}}>%</div>
                                                                        <div style={{fontWeight: '600', color: lotGainPercent >= 0 ? '#10b981' : '#ef4444'}}>
                                                                            {lotGainPercent >= 0 ? '+' : ''}{lotGainPercent.toFixed(1)}%
                                                                        </div>
                                                                    </div>
                                                                </div>

                                                                <div style={{display: 'flex', gap: '5px', flexWrap: 'wrap'}}>
                                                                    <button 
                                                                        className="btn btn-primary btn-sm" 
                                                                        onClick={(e) => {
                                                                            e.stopPropagation();
                                                                            setEditModal(lot);
                                                                        }}
                                                                        style={{flex: '1 1 auto', fontSize: '11px', padding: '5px 11px'}}
                                                                    >
                                                                        ✏️
                                                                    </button>
                                                                    <button 
                                                                        className="btn btn-success btn-sm" 
                                                                        onClick={(e) => {
                                                                            e.stopPropagation();
                                                                            sellInvestment(lot);
                                                                        }}
                                                                        style={{flex: '1 1 auto', fontSize: '11px', padding: '5px 11px'}}
                                                                    >
                                                                        💰
                                                                    </button>
                                                                    <button 
                                                                        className="btn btn-danger btn-sm" 
                                                                        onClick={(e) => {
                                                                            e.stopPropagation();
                                                                            deleteInvestment(lot.id);
                                                                        }}
                                                                        style={{flex: '1 1 auto', fontSize: '11px', padding: '5px 11px'}}
                                                                    >
                                                                        🗑️
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>

                            {filteredAndSortedAssets.length === 0 && (
                                <div className="warning-box">
                                    <p style={{textAlign: 'center', color: '#94a3b8'}}>
                                        Nessun asset trovato con i filtri attuali
                                    </p>
                                </div>
                            )}
                        </div>
                    )}

                    {groupedInvestments.length === 0 && (
                        <div className="info-box">
                            <h4 style={{fontSize: '17px', fontWeight: 'bold', marginBottom: '7px'}}>💡 Inizia il tuo portafoglio</h4>
                            <p style={{color: '#94a3b8'}}>Aggiungi il tuo primo investimento usando il form sopra. Potrai poi aggiungere più lotti dello stesso asset per fare DCA (Dollar Cost Averaging).</p>
                        </div>
                    )}
                </div>
            );
        };

        // ========== TAB DASHBOARD ==========
        const DashboardTab = ({ investments, soldInvestments, metrics, updatePrices, stakingPositions, processStakingRewards, toggleStaking, endStaking, editStakingStartDate, exportCSV, exportJSON, importJSON, loading, lastPriceUpdate, profile, pacSchedules, investmentPlan, aiAnalysis, setInvestments, setLastPriceUpdate, createPortfolioSnapshot, showToast, planAiAnalysis, analysisHistory, portfolioHistory, aiAnalysisHistory, setPacSchedules, setStakingPositions }) => {
            const safeStakingPositions = stakingPositions || [];
            const safeProcessStakingRewards = processStakingRewards || (() => {});
            const safeToggleStaking = toggleStaking || (() => {});
            const safeEndStaking = endStaking || (() => {});
            const safeEditStakingStartDate = editStakingStartDate || (() => {});

            const [editingStakingDate, setEditingStakingDate] = useState(null);
            
            const [stakingExpanded, setStakingExpanded] = useState(false);
            
            const [showInvestedBreakdown, setShowInvestedBreakdown] = useState(false);
            const [showValueBreakdown, setShowValueBreakdown] = useState(false);
            const [showGainLossBreakdown, setShowGainLossBreakdown] = useState(false);
            const [showPacBreakdown, setShowPacBreakdown] = useState(false);
            const [chartAsset, setChartAsset] = useState(null);
            const [showUpdatePricesModal, setShowUpdatePricesModal] = useState(false);
            const [showSingleAssetUpdateModal, setShowSingleAssetUpdateModal] = useState(false);
            const [showBulkUpdateModal, setShowBulkUpdateModal] = useState(false);
            const [bulkPrices, setBulkPrices] = useState({});

            const investedByType = useMemo(() => {
                const breakdown = {};
                investments.forEach(inv => {
                    const invested = inv.quantity * inv.purchasePrice;
                    breakdown[inv.type] = (breakdown[inv.type] || 0) + invested;
                });
                return breakdown;
            }, [investments]);
            
            const gainLossByType = useMemo(() => {
                const breakdown = {};
                investments.forEach(inv => {
                    const currentValue = inv.quantity * inv.currentPrice;
                    const invested = inv.quantity * inv.purchasePrice;
                    const gainLoss = currentValue - invested;
                    if (!breakdown[inv.type]) breakdown[inv.type] = { gainLoss: 0, currentValue: 0, invested: 0 };
                    breakdown[inv.type].gainLoss += gainLoss;
                    breakdown[inv.type].currentValue += currentValue;
                    breakdown[inv.type].invested += invested;
                });
                Object.keys(breakdown).forEach(type => {
                    breakdown[type].percent = (breakdown[type].gainLoss / breakdown[type].invested) * 100;
                });
                return breakdown;
            }, [investments]);
            const pacByType = useMemo(() => {
                const breakdown = {};
                
                pacSchedules.filter(p => !p.suspended).forEach(pac => {
                    if (!breakdown[pac.type]) {
                        breakdown[pac.type] = {
                            monthlyAmount: 0,
                            count: 0,
                            totalExecuted: 0,
                            totalInvested: 0,
                            pacs: []
                        };
                    }
                    
                    // Normalizza importo a mensile
                    let monthlyEquiv = pac.amount;
                    if (pac.frequency === 'quarterly') monthlyEquiv = pac.amount / 3;
                    if (pac.frequency === 'biannual') monthlyEquiv = pac.amount / 6;
                    
                    breakdown[pac.type].monthlyAmount += monthlyEquiv;
                    breakdown[pac.type].count += 1;
                    breakdown[pac.type].totalExecuted += (pac.executionHistory?.length || 0);
                    breakdown[pac.type].totalInvested += (pac.executionHistory || []).reduce((sum, ex) => sum + ex.amount, 0);
                    breakdown[pac.type].pacs.push(pac);
                });
                
                return breakdown;
            }, [pacSchedules]);

            const sendReportEmail = () => {
                if (!profile.email) {
                    alert('⚠️ Inserisci una email valida nel tab Profilazione prima di inviare il report!');
                    return;
                }
            
                // 1. GENERA E SCARICA IL JSON CON DATA
                const today = new Date().toISOString().split('T')[0];
                const reportData = {
                    version: '5.1',
                    exportDate: new Date().toISOString(),
                    profile: profile,
                    investments: investments,
                    soldInvestments: soldInvestments,
                    pacSchedules: pacSchedules,
                    investmentPlan: investmentPlan,
                    aiAnalysis: aiAnalysis,
                    lastPriceUpdate: lastPriceUpdate,
                    metrics: {
                        totalValue: metrics.totalValue,
                        totalInvested: metrics.totalInvested,
                        gainLoss: metrics.gainLoss,
                        gainLossPercent: metrics.gainLossPercent,
                        uniqueAssets: metrics.uniqueAssets
                    },
                    planAiAnalysis: planAiAnalysis,
                    analysisHistory: analysisHistory,
                    portfolioHistory: portfolioHistory,
                    aiAnalysisHistory: aiAnalysisHistory,
                };
                
                const blob = new Blob([JSON.stringify(reportData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `portfolio_backup_${today}.json`;
                a.click();
                URL.revokeObjectURL(url);
                
                // 2. PREPARA CORPO EMAIL ESTESO
                let emailBody = `📊 PORTFOLIO REPORT COMPLETO - ${new Date().toLocaleDateString('it-IT')}

            ══════════════════════════════════════════════════════════════
            📈 METRICHE DASHBOARD
            ══════════════════════════════════════════════════════════════

            💰 Valore Totale:     €${metrics.totalValue.toFixed(2)}
            🔥 Investito:         €${metrics.totalInvested.toFixed(0)}
            ${metrics.gainLoss >= 0 ? '📈' : '📉'} Gain/Loss:        ${metrics.gainLoss >= 0 ? '+' : ''}€${metrics.gainLoss.toFixed(2)} (${metrics.gainLossPercent.toFixed(1)}%)
            🧿 Asset Unici:       ${metrics.uniqueAssets}

            📊 ALLOCAZIONE ATTUALE:
            ${Object.entries(metrics.assetAllocation || {}).map(([type, value]) => {
                const percent = (value / metrics.totalValue) * 100;
                return `  • ${type}: €${value.toFixed(2)} (${percent.toFixed(1)}%)`;
            }).join('\n')}

            ══════════════════════════════════════════════════════════════
            💼 PORTAFOGLIO (${investments.length} investimenti)
            ══════════════════════════════════════════════════════════════

            ${investments.map(inv => {
                const value = inv.quantity * inv.currentPrice;
                const invested = inv.quantity * inv.purchasePrice;
                const gain = value - invested;
                const gainPercent = (gain / invested) * 100;
                return `• ${inv.name} (${inv.ticker})
            Quantità: ${inv.quantity} | Prezzo: €${inv.currentPrice.toFixed(4)}
            Valore: €${value.toFixed(2)} | Gain: ${gain >= 0 ? '+' : ''}€${gain.toFixed(2)} (${gainPercent.toFixed(1)}%)`;
            }).join('\n\n')}`;

                // 3. AGGIUNGI STORICO PORTAFOGLIO
                if (portfolioHistory && portfolioHistory.length > 0) {
                    const firstSnap = portfolioHistory[0];
                    const lastSnap = portfolioHistory[portfolioHistory.length - 1];
                    const totalReturn = lastSnap.totalValue - firstSnap.totalValue;
                    const totalReturnPercent = firstSnap.totalValue > 0 ? (totalReturn / firstSnap.totalValue) * 100 : 0;
                    
                    emailBody += `

            ══════════════════════════════════════════════════════════════
            📊 STORICO PORTAFOGLIO (${portfolioHistory.length} snapshot)
            ══════════════════════════════════════════════════════════════

            Periodo: ${new Date(firstSnap.date).toLocaleDateString('it-IT')} → ${new Date(lastSnap.date).toLocaleDateString('it-IT')}

            EVOLUZIONE:
            - Valore Iniziale:  €${firstSnap.totalValue.toFixed(2)}
            - Valore Finale:    €${lastSnap.totalValue.toFixed(2)}
            - Crescita Totale:  ${totalReturn >= 0 ? '+' : ''}€${totalReturn.toFixed(2)} (${totalReturnPercent.toFixed(1)}%)

                                            <div>
                                                <strong>Totale Versato:</strong> €{data.totalInvested.toFixed(2)}

                                                    const today = new Date();
                                                    let nextExecution;
                                                    
                                                    if (pac.frequency === 'monthly') {
                                                        nextExecution = new Date(today.getFullYear(), today.getMonth() + 1, startDate.getDate());

                                                        nextExecution = new Date(today.getFullYear(), today.getMonth() + 3, startDate.getDate());
                                                    } else {
                                                        nextExecution = new Date(today.getFullYear(), today.getMonth() + 6, startDate.getDate());
                                                    }
                                                    
                                                    const daysUntil = Math.ceil((nextExecution - today) / (1000 * 60 * 60 * 24));
                                                    const isUrgent = daysUntil <= 7;
                                                    
                                                    return (
                                                        <div key={pac.id} style={{
                                                            background: '#374151',
                                                            padding: '9px',
                                                            borderRadius: '5px',

                                                        return (staking.amount * cryptoPrice).toFixed(2);
                                                    })()}

                                                <div style={{fontWeight: 'bold', fontSize: '15px', color: '#10b981'}}>

                                                </div>

                                                    €{(() => {
                                                        const cryptoPrice = investments.find(inv => inv.ticker === staking.ticker)?.currentPrice || 0;
                                                        return (staking.totalRewards * cryptoPrice).toFixed(2);

                                                            .sort((a, b) => new Date(b.date) - new Date(a.date))

                                                                padding: '5px',
                                                                background: '#1e293b',
                                                                borderRadius: '3px',
                                                                marginBottom: '3px',
                                                                display: 'flex',
                                                                justifyContent: 'space-between'
                                                            }}>
                                                                <span>

                                                                    +{reward.amount.toFixed(8)}
                                                                </span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </details>

                                        </div>

                                const reportText = `Portfolio Report ${today}

                        Valore: €${metrics.totalValue.toFixed(2)}

                        Asset: ${metrics.uniqueAssets}

                        Report completo disponibile nell'app.`;
                                
                                navigator.clipboard.writeText(reportText).then(() => {
                                    alert('✅ Report copiato negli appunti!\n\nApri Gmail/Outlook e incolla (Ctrl+V)');
                                });
                            }}
                            disabled={investments.length === 0 || !profile.email}
                            style={{
                                background: 'linear-gradient(135deg, #7df5ef 0%, #07d9ce 100%)'

                                >

                                </div>
                                
                                {/* Opzione 2: Tutti gli Asset */}
                                <div 
                                    onClick={() => {
                                        setShowUpdatePricesModal(false);
                                        setShowBulkUpdateModal(true);
                                    }}
                                    style={{
                                        padding: '31px',
                                        background: 'linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%)',
                                        borderRadius: '15px',
                                        cursor: 'pointer',
                                        transition: 'all 0.2s',
                                        textAlign: 'center'
                                    }}
                                    onMouseEnter={(e) => e.currentTarget.style.transform = 'scale(1.05)'}
                                    onMouseLeave={(e) => e.currentTarget.style.transform = 'scale(1)'}
                                >
                                    <div style={{fontSize: '47px', marginBottom: '15px'}}>🌐</div>
                                    <div style={{fontSize: '19px', fontWeight: 'bold', marginBottom: '7px'}}>
                                        Tutti gli Asset
                                    </div>
                                    <div style={{fontSize: '13px', opacity: 0.9}}>

                            <button 
                                className="btn btn-secondary"

                                style={{width: '100%'}}

                                Annulla
                            </button>

                    </div>
                )}

                {/* Modal Singolo Asset (stesso codice dell'Opzione 1) */}
                {showSingleAssetUpdateModal && (
                    <div className="modal" onClick={() => setShowSingleAssetUpdateModal(false)}>
                        <div className="modal-content" onClick={(e) => e.stopPropagation()} style={{maxWidth: '500px'}}>
                            <h2 style={{fontSize: '23px', fontWeight: 'bold', marginBottom: '19px'}}>
                                🎯 Aggiorna Singolo Asset
                            </h2>
                            
                            <div style={{marginBottom: '15px'}}>
                                <label style={{display: 'block', fontSize: '13px', fontWeight: '600', marginBottom: '7px'}}>

                                <select 
                                    id="singleAssetSelect"
                                    style={{marginBottom: 0}}

                                    <option value="" disabled>-- Scegli asset --</option>

                                        <option key={inv.ticker} value={inv.ticker}>

                            <div style={{marginBottom: '19px'}}>

                                    id="singleAssetPrice"
                                    type="number"

                            <div style={{display: 'flex', gap: '11px'}}>
                                <button 
                                    className="btn btn-secondary"

                                <button 
                                    className="btn btn-primary" 
                                    onClick={() => {
                                        const ticker = document.getElementById('singleAssetSelect').value;

                                        if (!ticker) {

                                        const timestamp = Date.now();
                                        
                                        // Aggiorna e crea snapshot con dati CORRETTI
                                        setInvestments(prev => {

                                                inv.ticker === ticker 
                                                    ? { ...inv, currentPrice: price, lastUpdate: timestamp }

                                            // Crea snapshot CON i dati aggiornati

                                            return updatedInvestments;

                                        setLastPriceUpdate(timestamp);
                                        showToast(`✅ ${ticker} aggiornato a €${price.toFixed(2)}`);
                                        setShowSingleAssetUpdateModal(false);
