                                    style={{flex: 1}}

                    </div>
                    
                )}
                {/* Modal Aggiornamento Multiplo */}
                {showBulkUpdateModal && (() => {
                    // Crea mappa asset unici
                    const uniqueAssets = [...new Map(investments.map(inv => [inv.ticker, inv])).values()];
                    
                    return (
                        <div className="modal" onClick={() => {
                            setShowBulkUpdateModal(false);
                            setBulkPrices({});
                        }}>
                            <div 
                                className="modal-content" 
                                onClick={(e) => e.stopPropagation()} 
                                style={{maxWidth: '700px', maxHeight: '80vh', overflow: 'auto'}}
                            >
                                <div style={{
                                    position: 'sticky',
                                    top: 0,
                                    background: '#1e293b',
                                    zIndex: 10,
                                    paddingBottom: '15px',
                                    borderBottom: '2px solid #374151',
                                    marginBottom: '19px'
                                }}>
                                    <h2 style={{fontSize: '23px', fontWeight: 'bold', marginBottom: '7px'}}>
                                        🌐 Aggiorna Tutti gli Asset
                                    </h2>
                                    <p style={{fontSize: '13px', color: '#94a3b8', marginBottom: 0}}>
                                        Hai {uniqueAssets.length} asset da aggiornare. Lascia vuoto per non modificare.
                                    </p>
                                </div>
                                
                                {/* Lista Asset */}
                                <div style={{display: 'flex', flexDirection: 'column', gap: '11px', marginBottom: '19px'}}>
                                    {uniqueAssets.map(asset => (
                                        <div 
                                            key={asset.ticker}
                                            style={{
                                                background: '#374151',
                                                padding: '15px',
                                                borderRadius: '11px',
                                                border: '2px solid #4b5563'
                                            }}
                                        >
                                            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'start', marginBottom: '11px'}}>
                                                <div style={{flex: 1}}>
                                                    <div style={{fontSize: '15px', fontWeight: 'bold', marginBottom: '3px'}}>
                                                        {asset.name}
                                                    </div>
                                                    <div style={{fontSize: '11px', color: '#94a3b8'}}>
                                                        {asset.ticker} • Prezzo attuale: €{asset.currentPrice.toFixed(4)}
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <div style={{display: 'flex', gap: '11px', alignItems: 'end'}}>
                                                <div style={{flex: 1}}>
                                                    <label style={{
                                                        display: 'block', 
                                                        fontSize: '11px', 
                                                        fontWeight: '600', 
                                                        marginBottom: '5px',
                                                        color: '#94a3b8'
                                                    }}>
                                                        Nuovo Prezzo (€)
                                                    </label>
                                                    <input 
                                                        type="number"
                                                        step="0.0001"
                                                        placeholder={asset.currentPrice.toFixed(4)}
                                                        value={bulkPrices[asset.ticker] || ''}
                                                        onChange={(e) => {
                                                            const value = e.target.value;
                                                            setBulkPrices(prev => ({
                                                                ...prev,
                                                                [asset.ticker]: value
                                                            }));
                                                        }}
                                                        style={{
                                                            marginBottom: 0,
                                                            fontSize: '13px',
                                                            padding: '9px'
                                                        }}
                                                    />
                                                </div>
                                                
                                                <button
                                                    className="btn btn-secondary btn-sm"
                                                    onClick={() => {
                                                        setBulkPrices(prev => ({
                                                            ...prev,
                                                            [asset.ticker]: asset.currentPrice.toFixed(4)
                                                        }));
                                                    }}
                                                    style={{padding: '9px 16px'}}
                                                    title="Usa prezzo attuale"
                                                >
                                                    📋 Copia
                                                </button>
                                                
                                                {bulkPrices[asset.ticker] && (
                                                    <button
                                                        className="btn btn-danger btn-sm"
                                                        onClick={() => {
                                                            setBulkPrices(prev => {
                                                                const newPrices = {...prev};
                                                                delete newPrices[asset.ticker];
                                                                return newPrices;
                                                            });
                                                        }}
                                                        style={{padding: '9px 16px'}}
                                                        title="Cancella"
                                                    >
                                                        ✕
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                
                                {/* Info Box */}
                                <div style={{
                                    background: 'rgba(59, 130, 246, 0.1)',
                                    border: '1px solid #3b82f6',
                                    borderRadius: '7px',
                                    padding: '11px',
                                    marginBottom: '19px'
                                }}>
                                    <div style={{fontSize: '13px', color: '#94a3b8'}}>
                                        💡 <strong>Suggerimento:</strong> Puoi copiare i prezzi attuali con il bottone "📋 Copia" 
                                        e poi modificarli. Solo gli asset con un nuovo prezzo inserito verranno aggiornati.
                                    </div>
                                </div>
                                
                                {/* Statistiche */}
                                <div style={{
                                    background: '#374151',
                                    padding: '11px',
                                    borderRadius: '7px',
                                    marginBottom: '19px',
                                    textAlign: 'center'
                                }}>
                                    <div style={{fontSize: '13px', color: '#94a3b8'}}>
                                        Asset da aggiornare: <strong style={{color: '#10b981', fontSize: '17px'}}>
                                            {Object.keys(bulkPrices).filter(k => bulkPrices[k]).length}
                                        </strong> / {uniqueAssets.length}
                                    </div>
                                </div>
                                
                                {/* Bottoni Azione */}
                                <div style={{
                                    display: 'grid',
                                    gridTemplateColumns: '1fr 1fr 1fr',
                                    gap: '11px',
                                    position: 'sticky',
                                    bottom: 0,
                                    background: '#1e293b',
                                    paddingTop: '15px',
                                    borderTop: '2px solid #374151'
                                }}>
                                    <button 
                                        className="btn btn-secondary" 
                                        onClick={() => {
                                            setShowBulkUpdateModal(false);
                                            setBulkPrices({});
                                        }}
                                    >
                                        Annulla
                                    </button>
                                    
                                    <button 
                                        className="btn btn-warning" 
                                        onClick={() => {
                                            // Copia tutti i prezzi attuali
                                            const allPrices = {};
                                            uniqueAssets.forEach(asset => {
                                                allPrices[asset.ticker] = asset.currentPrice.toFixed(4);
                                            });
                                            setBulkPrices(allPrices);
                                            showToast('📋 Tutti i prezzi attuali copiati', 'info');
                                        }}
                                    >
                                        📋 Copia Tutti
                                    </button>
                                    
                                    <button 
                                        className="btn btn-primary" 
                                        onClick={() => {
                                            // Valida e aggiorna
                                            const updatesToApply = {};
                                            let invalidCount = 0;
                                            
                                            Object.entries(bulkPrices).forEach(([ticker, priceStr]) => {
                                                if (priceStr && priceStr.trim()) {
                                                    const price = parseFloat(priceStr);
                                                    if (!isNaN(price) && price > 0) {
                                                        updatesToApply[ticker] = price;
                                                    } else {
                                                        invalidCount++;
                                                    }
                                                }
                                            });
                                            
                                            if (invalidCount > 0) {
                                                alert(`⚠️ ${invalidCount} prezzi non validi ignorati.\n\nDeve essere un numero positivo.`);
                                            }
                                            
                                            if (Object.keys(updatesToApply).length === 0) {
                                                alert('⚠️ Nessun prezzo valido da aggiornare');
                                                return;
                                            }
                                            
                                            if (confirm(`✅ Aggiornare ${Object.keys(updatesToApply).length} asset?\n\n${Object.entries(updatesToApply).map(([t, p]) => `${t}: €${p.toFixed(2)}`).join('\n')}`)) {
                                                const timestamp = Date.now();
                                                
                                                // Aggiorna e crea snapshot con dati CORRETTI
                                                setInvestments(prev => {
                                                    const updatedInvestments = prev.map(inv => {
                                                        const newPrice = updatesToApply[inv.ticker];
                                                        return newPrice !== undefined 
                                                            ? { ...inv, currentPrice: newPrice, lastUpdate: timestamp } 
                                                            : inv;
                                                    });
                                                    
                                                    // Crea snapshot CON i dati aggiornati
                                                    setTimeout(() => createPortfolioSnapshot(updatedInvestments), 100);
                                                    
                                                    return updatedInvestments;
                                                });
                                                
                                                setLastPriceUpdate(timestamp);
                                                showToast(`✅ ${Object.keys(updatesToApply).length} asset aggiornati!`);
                                                setShowBulkUpdateModal(false);
                                                setBulkPrices({});
                                            }
                                        }}
                                    >
                                        ✅ Aggiorna ({Object.keys(bulkPrices).filter(k => bulkPrices[k]).length})
                                    </button>
                                </div>
                            </div>
                        </div>
                    );
                })()}
                {chartAsset && <PriceChartModal asset={chartAsset} onClose={() => setChartAsset(null)} investments={investments} />}
            </div>
        );
    };

        // ========== TAB STORICO ==========
        const HistoryTab = ({ portfolioHistory, investments, pacSchedules, setPortfolioHistory, createPortfolioSnapshot, deleteSnapshot, clearOldSnapshots, compressHistory, showToast }) => {
            const [selectedMetric, setSelectedMetric] = useState('totalValue');
            const [selectedType, setSelectedType] = useState('all');
            const [selectedAsset, setSelectedAsset] = useState(null);
            const [timeRange, setTimeRange] = useState('all'); // all, 30d, 90d, 180d, 365d
            const [showDetailedHistory, setShowDetailedHistory] = useState(false);  // ← AGGIUNGI
            const [showManagement, setShowManagement] = useState(false);            // ← AGGIUNGI
            const chartCanvasRef = React.useRef(null);
            const chartInstanceRef = React.useRef(null);

            // Filtra storico per time range
            const filteredHistory = React.useMemo(() => {
                if (timeRange === 'all') return portfolioHistory;
                
                const days = parseInt(timeRange);
                const cutoffDate = Date.now() - (days * 24 * 60 * 60 * 1000);
                return portfolioHistory.filter(snap => snap.id >= cutoffDate);
            }, [portfolioHistory, timeRange]);

            // Calcola statistiche
            const stats = React.useMemo(() => {
                if (filteredHistory.length === 0) return null;
                
                const values = filteredHistory.map(s => s.totalValue);
                const first = filteredHistory[0];
                const last = filteredHistory[filteredHistory.length - 1];
                
                // ✅ CALCOLO VERSAMENTI TOTALI NEL PERIODO
                const startDate = new Date(first.date);
                const endDate = new Date(last.date);
                
                // Versamenti da PAC eseguiti
                const pacContributions = pacSchedules.reduce((sum, pac) => {
                    const pacExecs = (pac.executionHistory || []).filter(exec => {
                        const execDate = new Date(exec.date);
                        return execDate >= startDate && execDate <= endDate;
                    });
                    return sum + pacExecs.reduce((s, e) => s + e.amount, 0);
                }, 0);
                
                // Versamenti da acquisti manuali (investimenti nuovi)
                const manualContributions = investments.reduce((sum, inv) => {
                    const purchaseDate = new Date(inv.purchaseDate);
                    if (purchaseDate >= startDate && purchaseDate <= endDate) {
                        // Solo se NON è un'esecuzione PAC (controllo opzionale)
                        const isPacExecution = pacSchedules.some(pac => 
                            (pac.executionHistory || []).some(exec => 
                                exec.date.split('T')[0] === inv.purchaseDate && 
                                exec.quantity === inv.quantity
                            )
                        );
                        if (!isPacExecution) {
                            return sum + (inv.quantity * inv.purchasePrice);
                        }
                    }
                    return sum;
                }, 0);
                
                const totalContributions = pacContributions + manualContributions;
                
                // ✅ RENDIMENTO REALE = Crescita Valore - Versamenti
                const totalReturn = (last.totalValue - first.totalValue) - totalContributions;
                const totalReturnPercent = first.totalValue > 0 ? (totalReturn / first.totalValue) * 100 : 0;
                
                const maxValue = Math.max(...values);
                const minValue = Math.min(...values);
                const avgValue = values.reduce((a, b) => a + b, 0) / values.length;
                
            

            // Calcola volatilità (deviazione standard dei rendimenti giornalieri)
            const returns = [];
                for (let i = 1; i < values.length; i++) {
                    const dailyReturn = ((values[i] - values[i-1]) / values[i-1]) * 100;
                    returns.push(dailyReturn);
                }
                const avgReturn = returns.reduce((a, b) => a + b, 0) / returns.length;
                const variance = returns.reduce((sum, r) => sum + Math.pow(r - avgReturn, 2), 0) / returns.length;
                const volatility = Math.sqrt(variance);
                
                // Max Drawdown
                let maxDrawdown = 0;
                let peak = values[0];
                for (let i = 1; i < values.length; i++) {
                    if (values[i] > peak) {
                        peak = values[i];
                    } else {
                        const drawdown = ((peak - values[i]) / peak) * 100;
                        if (drawdown > maxDrawdown) {
                            maxDrawdown = drawdown;
                        }
                    }
                }
                
                return {
                    first: first,
                    last: last,
                    totalReturn: totalReturn,
                    totalReturnPercent: totalReturnPercent,
                    totalContributions: totalContributions,  // ← NUOVO
                    pacContributions: pacContributions,      // ← NUOVO
                    manualContributions: manualContributions, // ← NUOVO
                    maxValue: maxValue,
                    minValue: minValue,
                    avgValue: avgValue,
                    volatility: volatility,
                    maxDrawdown: maxDrawdown,
                    dataPoints: filteredHistory.length
                };
            }, [filteredHistory]);

            // Disegna grafico
            React.useEffect(() => {
                if (!chartCanvasRef.current || filteredHistory.length === 0) return;
                
                // Distruggi grafico precedente
                if (chartInstanceRef.current) {
                    chartInstanceRef.current.destroy();
                }
                
                let labels, data, label, borderColor;
                
                if (selectedAsset) {
                    // Grafico singolo asset
                    labels = filteredHistory.map(s => new Date(s.date).toLocaleDateString('it-IT'));
                    data = filteredHistory.map(s => {
                        const assetData = Object.values(s.byType).flatMap(type => type.assets).find(a => a.ticker === selectedAsset);
                        return assetData ? assetData.value : 0;
                    });
                    label = `Valore ${selectedAsset}`;
                    borderColor = '#f59e0b';
                } else if (selectedType !== 'all') {
                    // Grafico per tipo SPECIFICO
                    labels = filteredHistory.map(s => new Date(s.date).toLocaleDateString('it-IT'));
                    
                    if (selectedMetric === 'totalValue') {
                        data = filteredHistory.map(s => s.byType[selectedType]?.value || 0);
                        label = `Valore ${selectedType}`;
                        borderColor = '#8b5cf6';
                    } else if (selectedMetric === 'gainLoss') {
                        // Calcola Gain/Loss per questo tipo
                        data = filteredHistory.map(s => {
                            const typeData = s.byType[selectedType];
                            if (!typeData) return 0;
                            return typeData.gainLoss || (typeData.value - typeData.invested) || 0;
                        });
                        label = `Gain/Loss ${selectedType}`;
                        borderColor = '#10b981';
                    } else if (selectedMetric === 'gainLossPercent') {
                        // Calcola Gain/Loss % per questo tipo
                        data = filteredHistory.map(s => {
                            const typeData = s.byType[selectedType];
                            if (!typeData || !typeData.invested || typeData.invested === 0) return 0;
                            const gainLoss = typeData.gainLoss || (typeData.value - typeData.invested);
                            return (gainLoss / typeData.invested) * 100;
                        });
                        label = `Gain/Loss % ${selectedType}`;
                        borderColor = '#a510b9';
                    }
                } else {
                    // Grafico totale
                    labels = filteredHistory.map(s => new Date(s.date).toLocaleDateString('it-IT'));
                    
                    if (selectedMetric === 'totalValue') {
                        data = filteredHistory.map(s => s.totalValue);
                        label = 'Valore Totale Portafoglio';
                        borderColor = '#3b82f6';
                    } else if (selectedMetric === 'gainLoss') {
                        data = filteredHistory.map(s => s.gainLoss);
                        label = 'Gain/Loss Totale';
                        borderColor = '#10b981';
                    } else if (selectedMetric === 'gainLossPercent') {
                        data = filteredHistory.map(s => s.gainLossPercent);
                        label = 'Gain/Loss %';
                        borderColor = '#a510b9';
                    }
                }
                
                // ⬇️ AGGIUNGI QUESTO: Calcola min/max dai dati EFFETTIVI ⬇️
                const dataMin = Math.min(...data);
                const dataMax = Math.max(...data);
                
                const ctx = chartCanvasRef.current.getContext('2d');
                chartInstanceRef.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: label,
                            data: data,
                            borderColor: borderColor,
                            backgroundColor: borderColor + '20',
                            tension: 0.4,
                            fill: true,
                            pointRadius: filteredHistory.length > 50 ? 0 : 3,
                            pointHoverRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { 
                                display: true, 
                                labels: { color: '#e2e8f0', font: { size: 14 } } 
                            },
                            tooltip: {
                                mode: 'index',
                                intersect: false,
                                callbacks: {
                                    label: function(context) {
                                        let label = context.dataset.label || '';
                                        if (label) label += ': ';
                                        if (selectedMetric === 'gainLossPercent' || label.includes('Gain/Loss %')) {
                                            label += context.parsed.y.toFixed(2) + '%';
                                        } else {
                                            label += '€' + context.parsed.y.toFixed(2);
                                        }
                                        return label;
                                    }
                                }
                            }
                        },
                        scales: {
                            y: { 
                                ticks: { 
                                    color: '#94a3b8',
                                    callback: function(value) {
                                        if (selectedMetric === 'gainLossPercent' || label.includes('Gain/Loss %')) {
                                            return value.toFixed(1) + '%';
                                        }
                                        return '€' + value.toFixed(0);
                                    }
                                },
                                grid: { color: '#374151' },
                                // ⬇️ USA min/max dai dati FILTRATI ⬇️
                                //min: dataMin - (Math.abs(dataMax - dataMin) * 0.1),  // 10% padding sotto
                                //max: dataMax + (Math.abs(dataMax - dataMin) * 0.1)   // 10% padding sopra
                            },
                            x: { 
                                ticks: { 
                                    color: '#94a3b8',
                                    maxTicksLimit: 10
                                },
                                grid: { color: '#374151' }
                            }
                        }
                    }
                });
                
                return () => {
                    if (chartInstanceRef.current) {
                        chartInstanceRef.current.destroy();
                    }
                };
            }, [filteredHistory, selectedMetric, selectedType, selectedAsset]);

            // Export dati per AI
            const exportForAI = () => {
                if (filteredHistory.length === 0) {
                    alert('⚠️ Nessun dato storico disponibile');
                    return;
                }
                
                const exportData = {
                    period: {
                        from: new Date(filteredHistory[0].date).toLocaleDateString('it-IT'),
                        to: new Date(filteredHistory[filteredHistory.length - 1].date).toLocaleDateString('it-IT'),

        PERIODO: ${exportData.period.from} → ${exportData.period.to}

        - Valore minimo: €${stats.minValue.toFixed(2)}

        💡 COME USARE QUESTI DATI:

        - "Il max drawdown è accettabile?"
        - "Posso migliorare il rapporto rischio/rendimento?"

        📊 DATI COMPLETI JSON:
        ${JSON.stringify(exportData, null, 2)}`;
                
                navigator.clipboard.writeText(textExport);
                alert('✅ Dati storici copiati negli appunti!\n\nIncollali nell\'AI per ricevere analisi personalizzata.');

                            </div>

                            <div className="metric-card" style={{background: 'linear-gradient(135deg, #ef4444 0%, #dc2626 100%)'}}>

                                            </div>
                                            {/* Gestione Snapshot - COLLASSABILE */}
                                            <div className="card">
                                                <div

                                                        transition: 'background 0.2s'

                                                    onMouseEnter={(e) => e.currentTarget.style.background = '#374151'}
                                                    onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}
                                                >
                                                    <h3 style={{fontSize: '19px', fontWeight: 'bold', margin: 0}}>
                                                        🗂️ Gestione Storico
                                                    </h3>
                                                    <div style={{fontSize: '19px', fontWeight: 'bold', color: '#a1a1a1'}}>
                                                        {showManagement ? '▼ Nascondi' : '▶ Espandi'}
                                                    </div>
                                                </div>
                                                
                                                {showManagement && (
                                                    <>
                                                        {/* Info snapshot compressi */}
                                                        {portfolioHistory.some(s => s.isCompressed) && (
                                                            <div className="info-box" style={{marginBottom: '15px'}}>
                                                                <strong>ℹ️ Storico Compresso:</strong> Alcuni snapshot sono medie di più periodi. 
                                                                Gli ultimi 30 giorni sono sempre originali.
                                                            </div>
                                                        )}
                                                        
                                                        {/* PRIMA RIGA: Bottoni Elimina */}
                                                        <div style={{display: 'flex', gap: '11px', flexWrap: 'wrap', marginBottom: '15px'}}>

                                                            <button 
                                                                className="btn btn-danger btn-sm"

                                                            <button

                                                                }}

                                                            >

                                                            <button

                                                                onClick={(e) => {

                                                        {/* SECONDA RIGA: Bottoni Gestione */}

                                                                    compressHistory();

                                                                onClick={(e) => {

                                                            >

                                                        {/* Info Box */}

                                                            <strong>💡 Gestione Automatica:</strong> 
                                                            <ul style={{marginTop: '7px', paddingLeft: '19px', marginBottom: 0}}>
                                                                <li>Snapshot creati automaticamente ad ogni aggiornamento prezzi</li>
                                                                <li>Massimo 365 snapshot mantenuti automaticamente</li>
                                                                <li>Usa "Comprimi Storico" per ridurre a ~50-100 snapshot mantenendo le tendenze</li>
                                                                <li>La compressione mantiene gli ultimi 30 giorni originali</li>
                                                            </ul>
                                                        </div>
                                                        {stats && stats.totalContributions > 0 && (
                                                            <div className="info-box" style={{marginTop: '19px'}}>
                                                                <h4 style={{fontSize: '15px', fontWeight: 'bold', marginBottom: '11px'}}>
                                                                    💰 Breakdown Versamenti nel Periodo
                                                                </h4>
                                                                <div style={{display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '15px', fontSize: '13px'}}>
                                                                    <div>
                                                                        <div style={{color: '#94a3b8', marginBottom: '3px'}}>PAC Eseguiti</div>
                                                                        <div style={{fontSize: '19px', fontWeight: 'bold', color: '#8b5cf6'}}>
                                                                            €{stats.pacContributions.toFixed(0)}
                                                                        </div>
                                                                    </div>
                                                                    <div>
                                                                        <div style={{color: '#94a3b8', marginBottom: '3px'}}>Acquisti Manuali</div>
                                                                        <div style={{fontSize: '19px', fontWeight: 'bold', color: '#3b82f6'}}>
                                                                            €{stats.manualContributions.toFixed(0)}
                                                                        </div>
                                                                    </div>
                                                                    <div>
                                                                        <div style={{color: '#94a3b8', marginBottom: '3px'}}>Totale Versato</div>
                                                                        <div style={{fontSize: '19px', fontWeight: 'bold', color: '#10b981'}}>
                                                                            €{stats.totalContributions.toFixed(0)}
                                                                        </div>
                                                                    </div>
                                                                </div>

                                                                    ℹ️ Il rendimento mostrato esclude questi versamenti per calcolare la performance reale del portafoglio
                                                                </div>
                                                            </div>
                                                        )}
